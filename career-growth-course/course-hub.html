<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Hub | Career Growth & Promotion Readiness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Noto+Sans+Tamil:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0b1f3a;--navy-light:#132c52;--gold:#d4a941;--gold-light:#f2d98a;--cream:#faf7f0;--text:#20242c;--muted:#5b6472;--success:#1e7a4c;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Poppins',sans-serif;background:var(--cream);color:var(--text);line-height:1.6;}
  [lang-ta]{font-family:'Noto Sans Tamil','Poppins',sans-serif;}
  .lang-toggle{position:fixed;top:16px;right:16px;z-index:100;background:#fff;border:2px solid var(--navy);border-radius:30px;padding:6px;display:flex;gap:4px;box-shadow:0 4px 12px rgba(0,0,0,.12);}
  .lang-toggle button{border:none;background:transparent;padding:8px 16px;border-radius:24px;font-weight:600;cursor:pointer;font-size:14px;color:var(--navy);font-family:'Poppins',sans-serif;}
  .lang-toggle button.active{background:var(--navy);color:#fff;}

  header{background:linear-gradient(135deg,var(--navy),var(--navy-light));color:#fff;padding:44px 20px 60px;text-align:center;}
  header h1{font-size:clamp(22px,4vw,30px);font-weight:800;margin-bottom:8px;}
  header p{color:#c3cfe0;font-size:14.5px;}
  #welcomeName{color:var(--gold-light);}

  .overall-progress{max-width:640px;margin:-30px auto 0;background:#fff;border-radius:14px;padding:20px 26px;box-shadow:0 10px 30px rgba(11,31,58,.12);position:relative;z-index:2;}
  .overall-progress .row{display:flex;justify-content:space-between;font-size:13.5px;color:var(--muted);margin-bottom:8px;}
  .bar-track{height:10px;background:#e7e0cd;border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--gold);border-radius:6px;transition:width .3s ease;}

  .wrap{max-width:800px;margin:0 auto;padding:50px 20px 70px;}
  .module-card{
    background:#fff;border-radius:14px;padding:22px 24px;margin-bottom:16px;
    box-shadow:0 4px 14px rgba(11,31,58,.06);display:flex;align-items:center;gap:18px;
    text-decoration:none;color:inherit;border:1px solid #efe9db;transition:transform .12s ease;
  }
  .module-card:hover{transform:translateY(-2px);border-color:var(--gold);}
  .module-card.locked{opacity:.55;cursor:not-allowed;}
  .m-num{
    flex-shrink:0;width:46px;height:46px;border-radius:50%;background:var(--navy);color:var(--gold-light);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;
  }
  .module-card.done .m-num{background:var(--success);color:#fff;}
  .m-info{flex:1;}
  .m-info h3{font-size:16.5px;color:var(--navy);margin-bottom:3px;}
  .m-info p{font-size:13.5px;color:var(--muted);}
  .m-status{font-size:12.5px;font-weight:700;color:var(--gold);flex-shrink:0;}
  .module-card.done .m-status{color:var(--success);}

  .cert-box{
    margin-top:30px;background:linear-gradient(135deg,var(--navy),var(--navy-light));color:#fff;
    border-radius:14px;padding:26px;text-align:center;
  }
  .cert-box h3{color:var(--gold-light);font-size:18px;margin-bottom:8px;}
  .cert-box p{color:#dbe3f0;font-size:14px;margin-bottom:16px;}
  .btn-cert{background:var(--gold);color:var(--navy);font-weight:700;padding:12px 26px;border-radius:8px;border:none;cursor:pointer;font-size:14.5px;font-family:'Poppins',sans-serif;}
  .btn-cert:disabled{background:#8a93a3;cursor:not-allowed;}

  footer{text-align:center;padding:30px 20px;color:var(--muted);font-size:13px;}
  footer .motto{color:var(--navy);font-weight:700;margin-bottom:6px;}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth-guard.js"></script>
</head>
<body>

<div class="lang-toggle">
  <button onclick="logout()" style="border:none; background:transparent; padding:8px 12px; font-weight:600; cursor:pointer; font-size:13px; color:var(--navy); font-family:'Poppins',sans-serif;">Logout</button>
  <button id="btn-en" class="active" onclick="setLang('en')">EN</button>
  <button id="btn-ta" onclick="setLang('ta')">தமிழ்</button>
</div>

<header>
  <h1 data-en="Career Growth & Promotion Readiness" data-ta="Career Growth & Promotion Readiness">Career Growth & Promotion Readiness</h1>
  <p><span data-en="Welcome back," data-ta="மீண்டும் வரவேற்கிறோம்,">Welcome back,</span> <span id="welcomeName">Student</span></p>
</header>

<div class="overall-progress">
  <div class="row">
    <span data-en="Your Progress" data-ta="உங்கள் முன்னேற்றம்">Your Progress</span>
    <span id="progressText">0 / 10 modules</span>
  </div>
  <div class="bar-track"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
</div>

<div class="wrap">
  <div id="moduleList"></div>

  <div class="cert-box">
    <h3 data-en="Course Completion" data-ta="Course Completion">Course Certificate</h3>
    <p data-en="Complete all 10 modules for completion." data-ta=" அனைத்து 10 பாடங்களையும் முடிக்கவும்.">Complete all 10 modules forcompletion.</p>
    <button class="btn-cert" id="certBtn" onclick="viewCertificate()" disabled data-en="Complete All Modules First" data-ta="முதலில் அனைத்து பாடங்களையும் முடிக்கவும்">Complete All Modules First</button>
  </div>
</div>

<footer>
  <div class="motto">God is always with u</div>
  <div>N T Somasundaram · somasundaramnt.lifecoach@gmail.com · WhatsApp: +91 98437 02244</div>
</footer>

<script>
const modules = [
  {en:"Why You're Stuck", ta:"ஏன் நீங்கள் நிற்கிறீர்கள்", en_d:"Diagnosing the real reasons plateaus happen.", ta_d:"தேக்கநிலைக்கான உண்மையான காரணங்களைக் கண்டறிதல்.", file:"module1-concepts.html", key:"module1"},
  {en:"The Promotion Equation", ta:"பதவி உயர்வு சமன்பாடு", en_d:"Performance + perception + positioning.", ta_d:"செயல்திறன் + கருத்து + நிலைப்படுத்தல்.", file:"module2-concepts.html", key:"module2"},
  {en:"Building Visibility Without Bragging", ta:"பெருமையடிக்காமல் தெரிவுநிலையை உருவாக்குதல்", en_d:"Authentic personal branding at work.", ta_d:"உண்மையான தனிப்பட்ட பிராண்டிங்.", file:"module3-concepts.html", key:"module3"},
  {en:"Closing Your Skill Gaps", ta:"திறன் இடைவெளிகளை நிரப்புதல்", en_d:"Mapping what the next level requires.", ta_d:"அடுத்த நிலைக்கு தேவையானதை வரைபடமாக்குதல்.", file:"module4-concepts.html", key:"module4"},
  {en:"Executive Presence", ta:"நிர்வாக இருப்பு", en_d:"How you're perceived at work.", ta_d:"பணியிடத்தில் நீங்கள் எவ்வாறு கருதப்படுகிறீர்கள்.", file:"module5-concepts.html", key:"module5"},
  {en:"Networking & Finding a Sponsor", ta:"நெட்வொர்க்கிங் மற்றும் ஆதரவாளர்", en_d:"The biggest lever most people ignore.", ta_d:"பெரும்பாலானோர் புறக்கணிக்கும் அம்சம்.", file:"module6-concepts.html", key:"module6"},
  {en:"Managing Upward", ta:"மேலிடத்தை நிர்வகித்தல்", en_d:"Getting your manager to advocate for you.", ta_d:"உங்கள் மேலாளர் ஆதரவளிக்க வைத்தல்.", file:"module7-concepts.html", key:"module7"},
  {en:"Navigating Office Politics", ta:"அலுவலக அரசியலைக் கையாளுதல்", en_d:"Skilfully, without losing integrity.", ta_d:"நேர்மையுடன் திறமையாக.", file:"module8-concepts.html", key:"module8"},
  {en:"Building Your Promotion Case", ta:"பதவி உயர்வு வழக்கை உருவாக்குதல்", en_d:"Documenting impact, preparing the ask.", ta_d:"தாக்கத்தை ஆவணப்படுத்துதல்.", file:"module9-concepts.html", key:"module9"},
  {en:"Life After the Promotion", ta:"பதவி உயர்வுக்குப் பிந்தைய வாழ்க்கை", en_d:"Sustaining momentum, avoiding the next plateau.", ta_d:"வேகத்தை தக்கவைத்தல்.", file:"module10-concepts.html", key:"module10"}
];

let currentLang = localStorage.getItem('cgpr_lang') || 'en';

function getProgress(){
  const raw = localStorage.getItem('cgpr_progress');
  return raw ? JSON.parse(raw) : {};
}

function renderModules(){
  const progress = getProgress();
  const doneCount = Object.values(progress).filter(v=>v).length;
  document.getElementById('progressText').textContent =
    currentLang==='ta' ? `${doneCount} / 10 பாடங்கள்` : `${doneCount} / 10 modules`;
  document.getElementById('barFill').style.width = (doneCount/10*100)+'%';

  const certBtn = document.getElementById('certBtn');
  if(doneCount === 10){
    certBtn.disabled = false;
    certBtn.textContent = currentLang==='ta' ? 'பார்' : 'View';
  } else {
    certBtn.disabled = true;
    certBtn.textContent = currentLang==='ta' ? 'முதலில் அனைத்து பாடங்களையும் முடிக்கவும்' : 'Complete All Modules First';
  }

  document.getElementById('moduleList').innerHTML = modules.map((m,i)=>{
    const isDone = progress[m.key] === true;
    return `
      <a class="module-card ${isDone?'done':''}" href="${m.file}">
        <div class="m-num">${isDone ? '✓' : i+1}</div>
        <div class="m-info">
          <h3>${currentLang==='ta'?m.ta:m.en}</h3>
          <p>${currentLang==='ta'?m.ta_d:m.en_d}</p>
        </div>
        <div class="m-status">${isDone ? (currentLang==='ta'?'முடிந்தது':'DONE') : (currentLang==='ta'?'திற':'OPEN')}</div>
      </a>
    `;
  }).join('');
}

function setLang(lang){
  currentLang = lang;
  localStorage.setItem('cgpr_lang', lang);
  document.getElementById('btn-en').classList.toggle('active', lang==='en');
  document.getElementById('btn-ta').classList.toggle('active', lang==='ta');
  document.querySelectorAll('[data-en]').forEach(elm=>{
    elm.textContent = lang==='ta' ? elm.getAttribute('data-ta') : elm.getAttribute('data-en');
  });
  renderModules();
}

function viewCertificate(){
  window.location.href = 'certificate.html';
}

document.getElementById('welcomeName').textContent = localStorage.getItem('cgpr_studentName') || 'Student';
setLang(currentLang);
</script>

</body>
</html>
