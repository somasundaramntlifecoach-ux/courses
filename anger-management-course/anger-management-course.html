<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anger Management Mastery — Course | NT Somasundaram Life Skills Program</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Noto+Sans+Tamil:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#2d6a4f;--primary-dark:#1b4332;--accent:#f4a261;--danger:#e63946;
    --cream:#fdf6ec;--ink:#1d2b24;--muted:#5b6b63;--card:#ffffff;--radius:14px;
    --border:#e6e2d8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Poppins',sans-serif;background:var(--cream);color:var(--ink);line-height:1.6;}
  body.ta,body.ta *{font-family:'Noto Sans Tamil','Poppins',sans-serif;}
  [data-ta]{display:none;}
  body.ta [data-en]{display:none;}
  body.ta [data-ta]{display:inline;}
  body.ta .block-ta{display:block;}

  /* ---------- Registration Gate ---------- */
  #gateOverlay{
    position:fixed;inset:0;background:linear-gradient(135deg,var(--primary-dark),var(--primary));
    z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .gate-card{background:#fff;border-radius:20px;padding:36px;max-width:420px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.3);}
  .gate-card h2{color:var(--primary-dark);font-size:1.4rem;margin-bottom:6px;text-align:center;}
  .gate-card p.sub{color:var(--muted);font-size:.9rem;text-align:center;margin-bottom:22px;}
  .gate-card label{font-size:.85rem;font-weight:600;color:var(--ink);display:block;margin:12px 0 4px;}
  .gate-card input{
    width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;font-size:.95rem;
    font-family:inherit;
  }
  .gate-card button{
    width:100%;margin-top:22px;background:var(--primary);color:#fff;border:none;padding:13px;
    border-radius:30px;font-weight:700;font-size:1rem;cursor:pointer;
  }
  .gate-error{color:var(--danger);font-size:.8rem;margin-top:8px;display:none;}
  .gate-lang{text-align:center;margin-bottom:14px;}
  .gate-lang button{width:auto;background:none;border:1px solid var(--border);color:var(--ink);
    padding:5px 14px;border-radius:16px;font-size:.78rem;font-weight:600;margin:0;}

  /* ---------- App Shell ---------- */
  #app{display:none;}
  #app.show{display:block;}
  header{
    background:var(--primary-dark);color:#fff;padding:16px 24px;display:flex;justify-content:space-between;
    align-items:center;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100;
  }
  header h1{font-size:1.05rem;font-weight:700;}
  header .hdr-right{display:flex;align-items:center;gap:14px;}
  .lang-toggle{
    background:rgba(255,255,255,.15);color:#fff;border:none;padding:6px 14px;border-radius:16px;
    font-size:.78rem;font-weight:600;cursor:pointer;
  }
  .progress-pill{background:var(--accent);color:#1d2b24;padding:6px 14px;border-radius:16px;font-size:.78rem;font-weight:700;}

  .layout{display:flex;max-width:1200px;margin:0 auto;min-height:calc(100vh - 60px);}
  nav.sidebar{
    width:280px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);padding:20px 0;
    position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;
  }
  .nav-item{
    display:flex;align-items:center;gap:12px;padding:13px 20px;cursor:pointer;border-left:3px solid transparent;
    font-size:.88rem;color:var(--ink);
  }
  .nav-item:hover{background:#f6f2ea;}
  .nav-item.active{background:#eef5f0;border-left-color:var(--primary);font-weight:700;color:var(--primary-dark);}
  .nav-num{
    width:26px;height:26px;border-radius:50%;background:var(--border);color:var(--muted);
    display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;
  }
  .nav-item.done .nav-num{background:var(--primary);color:#fff;}
  .nav-item.done .nav-num:after{content:"\2713";}
  main{flex:1;padding:34px 40px;max-width:820px;}

  .module-tag{color:var(--muted);font-size:.82rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  .module-title{font-size:1.6rem;font-weight:800;color:var(--primary-dark);margin-bottom:14px;}
  .module-intro{font-size:.95rem;color:var(--ink);margin-bottom:26px;padding-bottom:20px;border-bottom:1px solid var(--border);}

  /* ---------- Subtopic Accordion ---------- */
  .subtopic{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;
  }
  .subtopic-header{
    display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;background:#faf7f0;
  }
  .subtopic-header h3{font-size:1.02rem;color:var(--primary-dark);font-weight:700;}
  .subtopic-header .chevron{font-size:1.1rem;color:var(--primary);transition:transform .25s;flex-shrink:0;margin-left:10px;}
  .subtopic.open .chevron{transform:rotate(180deg);}
  .subtopic-body{display:none;padding:22px 20px;}
  .subtopic.open .subtopic-body{display:block;}
  .sub-num{
    display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;
    background:var(--primary);color:#fff;font-size:.72rem;font-weight:700;margin-right:10px;flex-shrink:0;
  }
  .sub-title-wrap{display:flex;align-items:center;}

  .content-block{margin-bottom:18px;}
  .content-block p{font-size:.92rem;color:var(--ink);}
  .callout{border-radius:var(--radius);padding:16px 18px;margin:16px 0;font-size:.88rem;}
  .callout.example{background:#eef5f0;border-left:4px solid var(--primary);}
  .callout.tips{background:#fff4e8;border-left:4px solid var(--accent);}
  .callout.improve{background:#fdeeee;border-left:4px solid var(--danger);}
  .callout-label{font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;color:var(--primary-dark);}
  .callout ul{padding-left:18px;}
  .callout li{margin-bottom:5px;font-size:.88rem;}

  .action-plan{background:#f6f2ea;border-radius:var(--radius);padding:16px 18px;margin:16px 0;}
  .action-plan h4{color:var(--primary-dark);margin-bottom:10px;font-size:.9rem;text-transform:uppercase;letter-spacing:.4px;}
  .action-plan ol{padding-left:18px;}
  .action-plan li{margin-bottom:6px;font-size:.88rem;}

  .worksheet{background:#fff;border:1.5px dashed var(--primary);border-radius:var(--radius);padding:18px 20px;margin:16px 0;}
  .worksheet-label{font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;color:var(--primary-dark);}
  .worksheet p.prompt{font-size:.9rem;margin-bottom:10px;font-weight:600;}
  .worksheet textarea{
    width:100%;min-height:70px;border:1px solid var(--border);border-radius:10px;padding:10px 12px;
    font-family:inherit;font-size:.88rem;resize:vertical;
  }
  .worksheet .save-note{font-size:.72rem;color:var(--muted);margin-top:6px;}

  .subtopic-complete-btn{
    background:none;border:1px solid var(--primary);color:var(--primary);padding:8px 16px;border-radius:20px;
    font-size:.8rem;font-weight:700;cursor:pointer;margin-top:6px;
  }
  .subtopic-complete-btn.done{background:var(--primary);color:#fff;}

  .module-reflection{background:#eef5f0;border-radius:var(--radius);padding:20px;margin-top:10px;}
  .module-reflection label{font-weight:700;font-size:.88rem;color:var(--primary-dark);display:block;margin-bottom:8px;}
  .module-reflection textarea{
    width:100%;min-height:80px;border:1px solid var(--border);border-radius:10px;padding:12px;
    font-family:inherit;font-size:.9rem;resize:vertical;
  }

  .nav-btns{display:flex;justify-content:space-between;margin-top:26px;gap:10px;flex-wrap:wrap;}
  .btn{
    padding:12px 26px;border-radius:30px;font-weight:700;font-size:.9rem;cursor:pointer;border:none;
    text-decoration:none;display:inline-flex;align-items:center;gap:8px;
  }
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-outline{background:#fff;color:var(--primary-dark);border:1px solid var(--border);}
  .btn-complete{background:var(--accent);color:#1d2b24;}
  .cert-box{
    text-align:center;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;
    padding:30px;border-radius:var(--radius);margin-top:20px;
  }
  .cert-box a.btn{background:var(--accent);color:#1d2b24;margin-top:14px;}
  @media(max-width:860px){
    .layout{flex-direction:column;}
    nav.sidebar{width:100%;position:static;height:auto;display:flex;overflow-x:auto;padding:10px;}
    .nav-item{flex-direction:column;text-align:center;min-width:110px;border-left:none;border-bottom:3px solid transparent;}
    .nav-item.active{border-bottom-color:var(--primary);}
    main{padding:24px 18px;}
  }
</style>

<script>
/* =========================================================

const SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbypgHH7Bw0Tzj2iUClPFKf7ymDAcOk0amaawo-O66glkho6oCGZkmsxKZdpn1Mms8DJLQ/exec";

/* =========================================================

========================================================= */
const modules = [{"title_en": "Understanding Anger — Science, Purpose & Myths", "title_ta": "கோபத்தைப் புரிதல் — அறிவியல், நோக்கம் மற்றும் தவறான கருத்துக்கள்", "intro_en": "Anger is not a flaw — it's a survival emotion that shows up when something feels unfair, blocked, or threatening. This module breaks down what's actually happening in your body and mind, and clears up the myths that keep people stuck in unhealthy patterns.", "intro_ta": "கோபம் ஒரு குறையல்ல — ஏதோ நியாயமற்றதாகவோ, தடுக்கப்பட்டதாகவோ, அச்சுறுத்தலாகவோ தோன்றும்போது எழும் ஒரு பாதுகாப்பு உணர்வு. இந்த பாட நிலை உங்கள் உடலிலும் மனதிலும் உண்மையில் என்ன நடக்கிறது என்பதை விளக்கி, மக்களை ஆரோக்கியமற்ற முறைகளில் சிக்க வைக்கும் தவறான கருத்துக்களை நீக்குகிறது.", "subtopics": [{"title_en": "What Anger Really Is", "title_ta": "கோபம் என்றால் உண்மையில் என்ன", "explanation_en": "Anger triggers a fast release of adrenaline and cortisol that narrows your thinking into 'fight' mode. Your thinking brain — the part responsible for logic and patience — is temporarily less active. This is why arguing logically with an angry person (including yourself) rarely works in the heat of the moment.", "explanation_ta": "கோபம் அட்ரினலின் மற்றும் கார்டிசால் ஹார்மோன்களை வேகமாக வெளியிட்டு உங்கள் சிந்தனையை 'போராடு' நிலைக்கு குறுக்குகிறது. தர்க்கம் மற்றும் பொறுமைக்கு பொறுப்பான சிந்தனை மூளை பகுதி தற்காலிகமாக குறைவாக செயல்படுகிறது. அதனால்தான் கோபமான ஒருவருடன் (உங்களுடன் உட்பட) தர்க்கரீதியாக வாதிடுவது கோபத்தின் உச்சத்தில் அரிதாகவே வேலை செய்கிறது.", "example_en": "A driver cuts you off in traffic. Your heart rate spikes in under a second — before you've even consciously registered what happened. That's the ancient threat-response system at work, not a character flaw.", "example_ta": "ஒரு ஓட்டுநர் போக்குவரத்தில் உங்களைக் குறுக்கிடுகிறார். என்ன நடந்தது என்பதை நீங்கள் உணருவதற்கு முன்பே ஒரு வினாடிக்குள் உங்கள் இதயத் துடிப்பு அதிகரிக்கிறது. இது பழமையான அச்சுறுத்தல் எதிர்வினை அமைப்பு, குணக்குறை அல்ல.", "tips_en": ["Notice the physical spike (heat, tight chest, faster breathing) as data, not danger.", "Remind yourself: 'My logical brain is offline right now — this is not the moment for big decisions.'", "Give yourself permission to feel angry without judging yourself for it."], "tips_ta": ["உடல் ரீதியான ஏற்றத்தை (சூடு, இறுக்கமான மார்பு, வேக சுவாசம்) ஆபத்தாக அல்ல, தகவலாகக் கவனியுங்கள்.", "'என் தர்க்க மூளை இப்போது ஆஃப்லைனில் உள்ளது — இது பெரிய முடிவுகளுக்கான தருணம் அல்ல' என நினைவூட்டுங்கள்.", "கோபமாக உணர்வதற்காக உங்களை நீங்களே குற்றம் சாட்டாமல் அனுமதி கொடுங்கள்."], "improve_en": "Most people try to 'think their way calm' the instant anger hits — but this is exactly the wrong moment for that. Instead of reasoning, focus purely on lowering the physical intensity first (see Module 4), then think afterward.", "improve_ta": "பெரும்பாலான மக்கள் கோபம் ஏற்பட்ட உடனேயே 'சிந்தித்து அமைதியாக' முயற்சி செய்கிறார்கள் — ஆனால் இது அதற்கான தவறான தருணம். தர்க்கத்திற்குப் பதிலாக, முதலில் உடல் தீவிரத்தைக் குறைப்பதில் மட்டும் கவனம் செலுத்துங்கள் (பாட நிலை 4ஐப் பார்க்கவும்), பின்பு சிந்தியுங்கள்.", "steps_en": ["For the next 3 days, notice when anger arises and simply name it out loud or in your head: 'I'm feeling angry right now.'", "Rate the intensity 1–10 each time you notice it.", "Do NOT try to suppress or fix anything yet — this is only about noticing."], "steps_ta": ["அடுத்த 3 நாட்களுக்கு, கோபம் எழும்போது அதை சத்தமாகவோ மனதிலோ பெயரிடுங்கள்: 'நான் இப்போது கோபமாக இருக்கிறேன்.'", "ஒவ்வொரு முறையும் அதன் தீவிரத்தை 1–10 என மதிப்பிடுங்கள்.", "இப்போது எதையும் அடக்கவோ சரிசெய்யவோ முயற்சிக்க வேண்டாம் — இது வெறும் கவனிப்புதான்."], "worksheet_en": "Describe one moment this week when you noticed your body reacting before your mind caught up. What physical sensation came first?", "worksheet_ta": "இந்த வாரம் உங்கள் மனது புரிந்துகொள்வதற்கு முன் உங்கள் உடல் எதிர்வினையாற்றியதை நீங்கள் கவனித்த ஒரு தருணத்தை விவரியுங்கள். முதலில் எந்த உடல் உணர்வு வந்தது?"}, {"title_en": "Common Myths About Anger", "title_ta": "கோபத்தைப் பற்றிய பொதுவான தவறான கருத்துக்கள்", "explanation_en": "Myth 1: 'Venting always helps' — research shows unfiltered venting often intensifies anger rather than releasing it. Myth 2: 'Good people don't get angry' — anger itself is neutral; only the actions taken because of it can be harmful. Myth 3: 'Suppressing anger means I've dealt with it' — suppressed anger usually resurfaces as resentment, health issues, or sudden outbursts later.", "explanation_ta": "தவறான கருத்து 1: 'கோபத்தை வெளிப்படுத்துவது எப்போதும் உதவும்' — வடிகட்டப்படாத வெளிப்பாடு கோபத்தை குறைப்பதற்குப் பதிலாக அதிகரிக்கும் என ஆராய்ச்சி காட்டுகிறது. தவறான கருத்து 2: 'நல்லவர்கள் கோபப்பட மாட்டார்கள்' — கோபமே நடுநிலையானது; அதனால் எடுக்கப்படும் செயல்கள்தான் தீங்கு விளைவிக்கும். தவறான கருத்து 3: 'கோபத்தை அடக்குவது என்பது அதைக் கையாண்டேன் என்று அர்த்தம்' — அடக்கப்பட்ட கோபம் பொதுவாக மனக்குறையாகவோ, உடல்நல பிரச்சனைகளாகவோ, திடீர் வெடிப்புகளாகவோ மீண்டும் தோன்றும்.", "example_en": "Someone punches a pillow every time they're angry, believing it 'releases' anger — but studies find this kind of catharsis often makes people angrier and more aggressive afterward, not less.", "example_ta": "ஒருவர் கோபப்படும் ஒவ்வொரு முறையும் தலையணையை அடிக்கிறார், இது கோபத்தை 'வெளியேற்றுகிறது' என நம்புகிறார் — ஆனால் இந்த வகை வெளிப்பாடு பின்னர் மக்களை அதிகமாக கோபமாகவும் ஆக்ரோஷமாகவும் ஆக்குகிறது என ஆய்வுகள் காட்டுகின்றன.", "tips_en": ["Replace 'venting' with 'processing' — talk it through calmly with a trusted person, not just release it explosively.", "Remember anger is information, not a verdict on your character.", "Watch for signs of suppression: chronic tiredness, sarcasm, or minor issues suddenly feeling huge."], "tips_ta": ["'வெளிப்படுத்துவதற்கு' பதிலாக 'செயலாக்குவதை' மேற்கொள்ளுங்கள் — வெடிப்பாக வெளியேற்றாமல் நம்பகமான ஒருவருடன் அமைதியாகப் பேசுங்கள்.", "கோபம் தகவல், உங்கள் குணத்தின் மீதான தீர்ப்பு அல்ல என்பதை நினைவில் கொள்ளுங்கள்.", "அடக்கத்தின் அறிகுறிகளை கவனியுங்கள்: நாள்பட்ட சோர்வு, கிண்டல், அல்லது சிறிய பிரச்சனைகள் திடீரென பெரியதாக உணரப்படுதல்."], "improve_en": "If you've been a 'pillow puncher' or 'venter,' shift toward structured processing: name the trigger, name the need behind it, then decide on one calm action — rather than repeating the explosive release.", "improve_ta": "நீங்கள் 'தலையணை அடிப்பவராகவோ' 'வெளிப்படுத்துபவராகவோ' இருந்திருந்தால், கட்டமைக்கப்பட்ட செயலாக்கத்தை நோக்கி மாறுங்கள்: தூண்டுதலைப் பெயரிடுங்கள், அதன் பின்னணியில் உள்ள தேவையைப் பெயரிடுங்கள், பின் வெடிப்பான வெளியீட்டை மீண்டும் செய்வதற்குப் பதிலாக ஒரு அமைதியான செயலைத் தேர்வு செய்யுங்கள்.", "steps_en": ["Write down one anger myth you personally used to believe.", "Identify one situation where you suppressed anger instead of processing it.", "This week, practice naming a trigger + the need behind it out loud, even quietly to yourself."], "steps_ta": ["நீங்கள் தனிப்பட்ட முறையில் நம்பிய ஒரு கோப தவறான கருத்தை எழுதுங்கள்.", "நீங்கள் கோபத்தை செயலாக்குவதற்குப் பதிலாக அடக்கிய ஒரு சூழலை அடையாளம் காணுங்கள்.", "இந்த வாரம், தூண்டுதல் + அதன் பின்னணியில் உள்ள தேவையை சத்தமாகவோ அல்லது அமைதியாகவோ பெயரிடப் பயிற்சி செய்யுங்கள்."], "worksheet_en": "Which anger myth has shaped your behavior the most, and how might letting go of it change how you respond next time?", "worksheet_ta": "எந்த கோப தவறான கருத்து உங்கள் நடத்தையை அதிகம் வடிவமைத்துள்ளது, அதை விட்டுவிடுவது அடுத்த முறை நீங்கள் பதிலளிக்கும் விதத்தை எப்படி மாற்றும்?"}, {"title_en": "Healthy vs Unhealthy Anger", "title_ta": "ஆரோக்கியமான vs ஆரோக்கியமற்ற கோபம்", "explanation_en": "Healthy anger is proportionate to the trigger, expressed in words rather than actions against people, and fades once addressed. Unhealthy anger is disproportionate, frequent, lingers for hours or days, or shows up as aggression, contempt, or stonewalling.", "explanation_ta": "ஆரோக்கியமான கோபம் தூண்டுதலுக்கு விகிதாசாரமானது, நபர்களுக்கு எதிரான செயல்களை விட வார்த்தைகளில் வெளிப்படுத்தப்படுகிறது, அது கையாளப்பட்டவுடன் மறைந்துவிடும். ஆரோக்கியமற்ற கோபம் விகிதாசாரமற்றது, அடிக்கடி நிகழ்கிறது, மணிக்கணக்கில் அல்லது நாட்கணக்கில் நீடிக்கிறது, அல்லது ஆக்ரோஷம், அவமதிப்பு அல்லது மௌன தண்டனையாக வெளிப்படுகிறது.", "example_en": "Healthy: 'I was annoyed my colleague was late, I told them calmly, and I felt fine an hour later.' Unhealthy: 'I was annoyed my colleague was late, and three days later I'm still giving them the silent treatment.'", "example_ta": "ஆரோக்கியமானது: 'என் சக ஊழியர் தாமதமாக வந்ததால் நான் எரிச்சலடைந்தேன், அமைதியாக அவர்களிடம் சொன்னேன், ஒரு மணி நேரத்தில் நலமாக உணர்ந்தேன்.' ஆரோக்கியமற்றது: 'என் சக ஊழியர் தாமதமாக வந்ததால் நான் எரிச்சலடைந்தேன், மூன்று நாட்களுக்குப் பிறகும் இன்னும் அவர்களிடம் மௌன தண்டனை கொடுக்கிறேன்.'", "tips_en": ["Check duration: does your anger fade within hours, or linger for days?", "Check proportion: does the intensity match the actual size of the trigger?", "Check expression: are you using words, or actions that hurt yourself or others?"], "tips_ta": ["காலஅளவைச் சரிபார்க்கவும்: உங்கள் கோபம் மணிநேரங்களில் மறைகிறதா, அல்லது நாட்கணக்கில் நீடிக்கிறதா?", "விகிதாசாரத்தைச் சரிபார்க்கவும்: தீவிரம் தூண்டுதலின் உண்மையான அளவுடன் பொருந்துகிறதா?", "வெளிப்பாட்டைச் சரிபார்க்கவும்: நீங்கள் வார்த்தைகளைப் பயன்படுத்துகிறீர்களா, அல்லது உங்களையோ மற்றவர்களையோ புண்படுத்தும் செயல்களையா?"], "improve_en": "If your anger tends to linger for days, that's a signal to build in a deliberate 'closing' step — a conversation, a written note, or a decision to let go — rather than letting it fade on its own timeline (or not fade at all).", "improve_ta": "உங்கள் கோபம் நாட்கணக்கில் நீடிக்கும் போக்கு இருந்தால், அது ஒரு வேண்டுமென்றே 'முடிக்கும்' படியை உருவாக்குவதற்கான சமிக்ஞை — ஒரு உரையாடல், எழுதப்பட்ட குறிப்பு, அல்லது விட்டுவிடும் முடிவு — அது தானாகவே மறையவிடுவதற்குப் பதிலாக (அல்லது மறையாமலேயே இருப்பதற்குப் பதிலாக).", "steps_en": ["Rate your last 3 anger episodes on duration and proportion.", "Identify which one lingered the longest, and why.", "Plan one 'closing step' for any anger that's currently unresolved."], "steps_ta": ["உங்கள் கடைசி 3 கோப சம்பவங்களை காலஅளவு மற்றும் விகிதாசாரத்தில் மதிப்பிடுங்கள்.", "எது அதிக நேரம் நீடித்தது, ஏன் என அடையாளம் காணுங்கள்.", "தற்போது தீர்க்கப்படாத எந்த கோபத்திற்கும் ஒரு 'முடிக்கும் படியை' திட்டமிடுங்கள்."], "worksheet_en": "Think of an anger episode that's still unresolved. What would a healthy 'closing step' look like for it?", "worksheet_ta": "இன்னும் தீர்க்கப்படாத ஒரு கோப சம்பவத்தை நினைத்துப் பாருங்கள். அதற்கு ஆரோக்கியமான 'முடிக்கும் படி' எப்படி இருக்கும்?"}]}, {"title_en": "Your Anger Style & Early Warning Signs", "title_ta": "உங்கள் கோப பாணி மற்றும் முன் எச்சரிக்கை அறிகுறிகள்", "intro_en": "Most people default to one of three anger styles, each learned over years. Recognizing your style — and your body's early warning signs — is the first practical skill toward catching anger before it takes over.", "intro_ta": "பெரும்பாலான மக்கள் ஆண்டுகளாகக் கற்றுக்கொண்ட மூன்று கோப பாணிகளில் ஒன்றைப் பின்பற்றுகிறார்கள். உங்கள் பாணியையும், உங்கள் உடலின் முன் எச்சரிக்கை அறிகுறிகளையும் அடையாளம் காண்பது கோபம் கட்டுக்கடங்காமல் போவதற்கு முன் அதைப் பிடிப்பதற்கான முதல் நடைமுறை திறன்.", "subtopics": [{"title_en": "The Three Anger Styles", "title_ta": "மூன்று கோப பாணிகள்", "explanation_en": "The Exploder reacts immediately and loudly. The Stuffer swallows anger, goes quiet, and lets resentment build silently. The Sniper is indirect — sarcasm, silent treatment, passive-aggressive digs. None of these make you a 'bad person' — they're learned coping patterns.", "explanation_ta": "வெடிப்பவர் உடனடியாகவும் சத்தமாகவும் எதிர்வினையாற்றுகிறார். அடக்குபவர் கோபத்தை விழுங்கி, அமைதியாகிவிடுவார், மனக்குறை அமைதியாக வளர அனுமதிக்கிறார். மறைமுகமானவர் மறைமுகமானவர் — கிண்டல், மௌன சிகிச்சை, மறைமுக தாக்குதல்கள். இவை எதுவும் உங்களை 'கெட்டவராக' ஆக்காது — இவை கற்றுக்கொள்ளப்பட்ட சமாளிப்பு முறைகள்.", "example_en": "A Stuffer at work says 'It's fine' three times about a missed deadline, then quits the job six months later feeling unappreciated — the anger never disappeared, it just went underground.", "example_ta": "வேலையில் ஒரு அடக்குபவர் தவறிய கால அவகாசத்தைப் பற்றி 'பரவாயில்லை' என மூன்று முறை சொல்கிறார், பின் ஆறு மாதங்களில் பாராட்டப்படாதது போல் உணர்ந்து வேலையை விட்டு விடுகிறார் — கோபம் மறையவில்லை, அது கீழே சென்றது.", "tips_en": ["Notice which style you default to at home vs at work — they can differ.", "Remember the Sniper style often feels 'safer' but damages trust just as much as an explosion.", "None of the three styles is fixed — with practice you can move toward assertive expression (Module 6)."], "tips_ta": ["வீட்டிலும் வேலையிலும் நீங்கள் இயல்பாகப் பின்பற்றும் பாணியைக் கவனியுங்கள் — அவை வேறுபடலாம்.", "மறைமுகமான பாணி 'பாதுகாப்பானது' போல் உணரப்பட்டாலும் நம்பிக்கையை வெடிப்பைப் போலவே சேதப்படுத்தும் என்பதை நினைவில் கொள்ளுங்கள்.", "மூன்று பாணிகளில் எதுவும் நிலையானது அல்ல — பயிற்சியுடன் நீங்கள் உறுதியான வெளிப்பாட்டை நோக்கி நகரலாம் (பாட நிலை 6)."], "improve_en": "If you identify as a Stuffer, practice voicing small irritations early and calmly, before they accumulate. If you're an Exploder, focus on the cooling techniques in Module 4 before speaking. If you're a Sniper, replace indirect comments with a direct, honest one-liner.", "improve_ta": "நீங்கள் அடக்குபவராக அடையாளம் காணப்பட்டால், சிறிய எரிச்சல்களை குவிவதற்கு முன் சீக்கிரமே அமைதியாகச் சொல்லப் பயிற்சி செய்யுங்கள். நீங்கள் வெடிப்பவராக இருந்தால், பேசுவதற்கு முன் பாட நிலை 4ன் அமைதி நுட்பங்களில் கவனம் செலுத்துங்கள். நீங்கள் மறைமுகமானவராக இருந்தால், மறைமுக கருத்துக்களுக்குப் பதிலாக நேரடியான, நேர்மையான ஒரு வரியைப் பயன்படுத்துங்கள்.", "steps_en": ["Identify which style — Exploder, Stuffer, or Sniper — describes you most often.", "Recall one recent incident where this style showed up.", "Choose one small alternative behavior to try next time that trigger appears."], "steps_ta": ["வெடிப்பவர், அடக்குபவர், மறைமுகமானவர் — எந்த பாணி உங்களை அதிகம் விவரிக்கிறது என அடையாளம் காணுங்கள்.", "இந்த பாணி தோன்றிய ஒரு சமீபத்திய சம்பவத்தை நினைவுகூருங்கள்.", "அந்த தூண்டுதல் மீண்டும் தோன்றும்போது முயற்சிக்க ஒரு சிறிய மாற்று நடத்தையைத் தேர்வு செய்யுங்கள்."], "worksheet_en": "Which style — Exploder, Stuffer, or Sniper — do you recognize most in yourself, and where do you think you learned it?", "worksheet_ta": "வெடிப்பவர், அடக்குபவர், மறைமுகமானவர் — எந்த பாணியை உங்களில் அதிகம் அடையாளம் காண்கிறீர்கள், அதை எங்கிருந்து கற்றுக்கொண்டீர்கள் என நினைக்கிறீர்கள்?"}, {"title_en": "Physical Warning Signs", "title_ta": "உடல் எச்சரிக்கை அறிகுறிகள்", "explanation_en": "Before anger fully erupts, your body gives signals: clenched jaw, tight chest, faster speech, heat in the face or neck, tunnel vision, or a racing heartbeat. Learning to spot these early gives you a window to act before the explosion.", "explanation_ta": "கோபம் முழுமையாக வெடிப்பதற்கு முன், உங்கள் உடல் சமிக்ஞைகளைத் தருகிறது: இறுக்கமான தாடை, இறுக்கமான மார்பு, வேகமான பேச்சு, முகத்தில் அல்லது கழுத்தில் சூடு, குறுகிய பார்வை, அல்லது வேகமான இதயத் துடிப்பு. இவற்றை முன்கூட்டியே கண்டறிய கற்றுக்கொள்வது வெடிப்பதற்கு முன் செயல்பட ஒரு சாளரத்தைத் தருகிறது.", "example_en": "During a tense phone call, you notice your jaw is clenched and your voice has sped up — recognizing this in real time lets you consciously slow down before your tone becomes sharp.", "example_ta": "பதட்டமான தொலைபேசி அழைப்பின்போது, உங்கள் தாடை இறுக்கமாகவும் உங்கள் குரல் வேகமாகவும் இருப்பதை கவனிக்கிறீர்கள் — இதை நிகழ் நேரத்தில் அடையாளம் காண்பது உங்கள் தொனி கூர்மையாகுவதற்கு முன் நனவுடன் மெதுவாகச் செல்ல அனுமதிக்கிறது.", "tips_en": ["Do a quick body scan (jaw, shoulders, chest, hands) whenever you feel tension rising.", "Keep a small list of your personal top 3 warning signs somewhere visible, like your phone's notes.", "Treat each warning sign as a cue to pause, not as something to hide or ignore."], "tips_ta": ["பதற்றம் அதிகரிக்கும் போதெல்லாம் ஒரு விரைவான உடல் ஸ்கேன் (தாடை, தோள்கள், மார்பு, கைகள்) செய்யுங்கள்.", "உங்கள் தனிப்பட்ட முதல் 3 எச்சரிக்கை அறிகுறிகளின் சிறிய பட்டியலை உங்கள் ஃபோன் குறிப்புகள் போன்ற தெரியும் இடத்தில் வைத்திருங்கள்.", "ஒவ்வொரு எச்சரிக்கை அறிகுறியையும் மறைக்க வேண்டியது அல்ல, நிறுத்தத்திற்கான குறிப்பாகக் கருதுங்கள்."], "improve_en": "Many people only notice warning signs after the fact. Improve this by setting a habit: 3 times a day, pause for 5 seconds and simply ask 'how does my body feel right now?' This builds the muscle of noticing in real time.", "improve_ta": "பலர் நிகழ்வுக்குப் பிறகுதான் எச்சரிக்கை அறிகுறிகளைக் கவனிக்கிறார்கள். ஒரு பழக்கத்தை அமைப்பதன் மூலம் இதை மேம்படுத்துங்கள்: நாளொன்றுக்கு 3 முறை, 5 வினாடிகள் நிறுத்தி, 'என் உடல் இப்போது எப்படி உணர்கிறது?' என்று கேளுங்கள். இது நிகழ் நேரத்தில் கவனிக்கும் திறனை உருவாக்குகிறது.", "steps_en": ["List your top 3 physical warning signs.", "Set 3 daily reminder check-ins on your phone to do a quick body scan.", "The next time you notice a warning sign, pause and take one slow breath before continuing."], "steps_ta": ["உங்கள் முதல் 3 உடல் எச்சரிக்கை அறிகுறிகளைப் பட்டியலிடுங்கள்.", "விரைவான உடல் ஸ்கேன் செய்ய உங்கள் ஃபோனில் 3 தினசரி நினைவூட்டல்களை அமைக்கவும்.", "அடுத்த முறை எச்சரிக்கை அறிகுறியை கவனிக்கும்போது, தொடர்வதற்கு முன் நிறுத்தி ஒரு மெதுவான மூச்சு விடுங்கள்."], "worksheet_en": "What are your top 3 physical warning signs of rising anger, and in which situations do you notice them most?", "worksheet_ta": "அதிகரிக்கும் கோபத்தின் உங்கள் முதல் 3 உடல் எச்சரிக்கை அறிகுறிகள் என்ன, எந்த சூழல்களில் அவற்றை அதிகம் கவனிக்கிறீர்கள்?"}, {"title_en": "Tracking Your Pattern", "title_ta": "உங்கள் முறையைக் கண்காணித்தல்", "explanation_en": "A simple anger log — trigger, intensity (1–10), style shown, and outcome — reveals patterns invisible in the moment: certain people, times of day, or topics that reliably spike your anger.", "explanation_ta": "ஒரு எளிய கோப பதிவு — தூண்டுதல், தீவிரம் (1–10), காட்டப்பட்ட பாணி, முடிவு — தருணத்தில் தெரியாத முறைகளை வெளிப்படுத்துகிறது: குறிப்பிட்ட நபர்கள், நாளின் நேரங்கள், அல்லது தலைப்புகள் நம்பகமாக உங்கள் கோபத்தை அதிகரிக்கின்றன.", "example_en": "After a week of logging, someone notices their anger intensity is consistently higher after 9pm — pointing to tiredness, not the trigger itself, as the real amplifier.", "example_ta": "ஒரு வாரம் பதிவு செய்த பிறகு, ஒருவர் தங்கள் கோப தீவிரம் இரவு 9 மணிக்குப் பிறகு தொடர்ந்து அதிகமாக இருப்பதைக் கவனிக்கிறார் — இது தூண்டுதலே அல்ல, சோர்வுதான் உண்மையான பெருக்கி என்பதைச் சுட்டிக்காட்டுகிறது.", "tips_en": ["Keep the log simple — a notes app entry takes 20 seconds.", "Log even small irritations, not just big blow-ups — patterns often hide in the small ones.", "Review your log weekly, looking for repeat people, times, or topics."], "tips_ta": ["பதிவை எளிமையாக வைத்திருங்கள் — ஒரு குறிப்புகள் ஆப் பதிவு 20 வினாடிகள் எடுக்கும்.", "பெரிய வெடிப்புகளை மட்டுமல்ல, சிறிய எரிச்சல்களையும் பதிவு செய்யுங்கள் — முறைகள் பெரும்பாலும் சிறியவற்றில் மறைந்திருக்கும்.", "மீண்டும் வரும் நபர்கள், நேரங்கள் அல்லது தலைப்புகளைத் தேடி வாரந்தோறும் உங்கள் பதிவை மதிப்பாய்வு செய்யுங்கள்."], "improve_en": "If you find logging tedious, simplify to just 3 words per entry: trigger, intensity number, and one-word outcome. Consistency matters more than detail.", "improve_ta": "பதிவு செய்வது சலிப்பாக இருந்தால், ஒரு பதிவுக்கு வெறும் 3 வார்த்தைகளாக எளிமையாக்குங்கள்: தூண்டுதல், தீவிர எண், ஒரு வார்த்தை முடிவு. விரிவை விட நிலைத்தன்மை முக்கியம்.", "steps_en": ["Start a simple anger log today — trigger, intensity 1–10, outcome.", "Log every anger episode, big or small, for one full week.", "At the end of the week, review the log and circle any repeating pattern."], "steps_ta": ["இன்று ஒரு எளிய கோப பதிவைத் தொடங்குங்கள் — தூண்டுதல், தீவிரம் 1–10, முடிவு.", "ஒரு முழு வாரத்திற்கு ஒவ்வொரு கோப சம்பவத்தையும், பெரியதோ சிறியதோ, பதிவு செய்யுங்கள்.", "வார இறுதியில், பதிவை மதிப்பாய்வு செய்து, மீண்டும் வரும் எந்த முறையையும் வட்டமிடுங்கள்."], "worksheet_en": "After tracking for a week, what pattern (person, time, topic) showed up most often in your anger log?", "worksheet_ta": "ஒரு வாரம் கண்காணித்த பிறகு, உங்கள் கோப பதிவில் எந்த முறை (நபர், நேரம், தலைப்பு) அதிகம் தோன்றியது?"}]}, {"title_en": "The Anger Cycle — Trigger, Thought, Body, Action", "title_ta": "கோப சுழற்சி — தூண்டுதல், எண்ணம், உடல், செயல்", "intro_en": "Anger doesn't jump straight from event to explosion — there's a cycle with a hidden lever you can learn to pull. This module maps that cycle so you can see exactly where to interrupt it.", "intro_ta": "கோபம் நிகழ்விலிருந்து நேரடியாக வெடிப்புக்குச் செல்லாது — நீங்கள் இழுக்கக் கற்றுக்கொள்ளக்கூடிய மறைமுக கருவியுடன் ஒரு சுழற்சி உள்ளது. இந்த பாட நிலை அந்த சுழற்சியை வரைபடமாக்கி, அதை எங்கே நிறுத்தலாம் என்பதைத் துல்லியமாகக் காட்டுகிறது.", "subtopics": [{"title_en": "Trigger & Interpretation", "title_ta": "தூண்டுதல் மற்றும் விளக்கம்", "explanation_en": "The same trigger can produce completely different results depending on how your mind interprets it. Your interpretation — not the event itself — is usually the real fuel behind anger.", "explanation_ta": "ஒரே தூண்டுதல் உங்கள் மனது அதை எப்படி விளக்குகிறது என்பதைப் பொறுத்து முற்றிலும் மாறுபட்ட முடிவுகளைத் தரலாம். உங்கள் விளக்கம்தான் — நிகழ்வே அல்ல — பொதுவாக கோபத்தின் பின்னணியில் உள்ள உண்மையான எரிபொருள்.", "example_en": "Your teenager doesn't reply to your message for 3 hours. Interpretation A: 'They're ignoring me on purpose' → anger. Interpretation B: 'They're probably in class or asleep' → no anger at all.", "example_ta": "உங்கள் இளைஞர் 3 மணி நேரம் உங்கள் செய்திக்கு பதில் தரவில்லை. விளக்கம் A: 'அவர்கள் வேண்டுமென்றே என்னை புறக்கணிக்கிறார்கள்' → கோபம். விளக்கம் B: 'அவர்கள் வகுப்பிலோ தூக்கத்திலோ இருக்கலாம்' → கோபமே இல்லை.", "tips_en": ["Before reacting, ask: 'Is there another possible explanation for this?'", "Notice if you're assuming intent ('they did this on purpose') without evidence.", "Give people the same benefit of the doubt you'd want for yourself."], "tips_ta": ["எதிர்வினையாற்றுவதற்கு முன், 'இதற்கு வேறு விளக்கம் இருக்குமா?' எனக் கேளுங்கள்.", "ஆதாரமின்றி நோக்கத்தை (\"அவர்கள் வேண்டுமென்றே இதைச் செய்தார்கள்\") நீங்கள் ஊகிக்கிறீர்களா எனக் கவனியுங்கள்.", "உங்களுக்கு நீங்களே எதிர்பார்க்கும் அதே சந்தேக பலனை மற்றவர்களுக்கும் கொடுங்கள்."], "improve_en": "If you notice you almost always assume the worst-case interpretation, deliberately practice writing down 2 alternative, more generous explanations for any trigger before reacting.", "improve_ta": "நீங்கள் எப்போதும் மோசமான வழக்கு விளக்கத்தையே ஊகிப்பதை கவனித்தால், எதிர்வினையாற்றுவதற்கு முன் எந்த தூண்டுதலுக்கும் 2 மாற்று, தாராள விளக்கங்களை வேண்டுமென்றே எழுதப் பயிற்சி செய்யுங்கள்.", "steps_en": ["Recall your last angry moment and write down your instant interpretation.", "Write 2 alternative explanations for the same trigger.", "Notice how your anger intensity would change with each alternative."], "steps_ta": ["உங்கள் கடைசி கோப தருணத்தை நினைவுகூர்ந்து உங்கள் உடனடி விளக்கத்தை எழுதுங்கள்.", "அதே தூண்டுதலுக்கு 2 மாற்று விளக்கங்களை எழுதுங்கள்.", "ஒவ்வொரு மாற்றுடனும் உங்கள் கோப தீவிரம் எப்படி மாறும் எனக் கவனியுங்கள்."], "worksheet_en": "Think of a recurring trigger in your life. What's your automatic interpretation, and what's one more generous alternative?", "worksheet_ta": "உங்கள் வாழ்க்கையில் மீண்டும் வரும் ஒரு தூண்டுதலை நினைத்துப் பாருங்கள். உங்கள் தானியங்கி விளக்கம் என்ன, ஒரு தாராள மாற்று என்ன?"}, {"title_en": "Body Response", "title_ta": "உடல் எதிர்வினை", "explanation_en": "Once your mind interprets a trigger as threatening or unfair, your body responds automatically — increased heart rate, muscle tension, shallow breathing — preparing you to 'fight.' This happens within seconds, before conscious choice kicks in.", "explanation_ta": "உங்கள் மனது ஒரு தூண்டுதலை அச்சுறுத்தலாகவோ நியாயமற்றதாகவோ விளக்கியவுடன், உங்கள் உடல் தானாகவே எதிர்வினையாற்றுகிறது — அதிகரித்த இதயத் துடிப்பு, தசை இறுக்கம், ஆழமற்ற சுவாசம் — உங்களை 'போராட' தயார்படுத்துகிறது. இது நனவான தேர்வு வருவதற்கு முன் வினாடிகளுக்குள் நடக்கிறது.", "example_en": "Mid-argument, you notice your fists have clenched and your breathing has become shallow — without deciding to do either. That's the body response stage, happening ahead of any conscious action.", "example_ta": "வாக்குவாதத்தின் நடுவே, நீங்கள் இரண்டையும் முடிவு செய்யாமலேயே உங்கள் கைகள் இறுக்கமாகவும் சுவாசம் ஆழமற்றதாகவும் இருப்பதைக் கவனிக்கிறீர்கள். இது எந்த நனவான செயலுக்கும் முன் நடக்கும் உடல் எதிர்வினை நிலை.", "tips_en": ["Treat the body response as a checkpoint, not a command you must obey.", "The body response peaks and fades within minutes if you don't feed it with more hot thoughts or aggressive action.", "Physical movement (a short walk) can help discharge the body's built-up energy safely."], "tips_ta": ["உடல் எதிர்வினையை நீங்கள் கீழ்ப்படிய வேண்டிய கட்டளையாக அல்ல, ஒரு சோதனை புள்ளியாகக் கருதுங்கள்.", "நீங்கள் அதிக சூடான எண்ணங்கள் அல்லது ஆக்ரோஷமான செயலால் அதை உணவளிக்கவில்லை என்றால், உடல் எதிர்வினை நிமிடங்களுக்குள் உச்சத்தை அடைந்து மறையும்.", "உடல் இயக்கம் (ஒரு குறுகிய நடை) உடலின் குவிந்த ஆற்றலை பாதுகாப்பாக வெளியேற்ற உதவும்."], "improve_en": "If you tend to act immediately on the body's urgency, build in a mandatory pause — even 10 seconds — between noticing the body response and taking any action.", "improve_ta": "நீங்கள் உடலின் அவசரத்தில் உடனடியாக செயல்படும் போக்கு இருந்தால், உடல் எதிர்வினையை கவனிப்பதற்கும் எந்த செயலையும் எடுப்பதற்கும் இடையே ஒரு கட்டாய இடைவெளியை — 10 வினாடிகள் கூட — உருவாக்குங்கள்.", "steps_en": ["Next time you feel anger, name the body sensation out loud: 'My chest is tight, my jaw is clenched.'", "Wait 10 seconds before responding or acting.", "Notice whether the intensity dropped even slightly after the pause."], "steps_ta": ["அடுத்த முறை கோபம் உணரும்போது, உடல் உணர்வை சத்தமாகப் பெயரிடுங்கள்: 'என் மார்பு இறுக்கமாக உள்ளது, தாடை இறுக்கமாக உள்ளது.'", "பதிலளிக்கவோ செயல்படவோ முன் 10 வினாடிகள் காத்திருங்கள்.", "இடைவெளிக்குப் பிறகு தீவிரம் சிறிதேனும் குறைந்ததா எனக் கவனியுங்கள்."], "worksheet_en": "Describe the exact body sensations you notice during anger — where in your body do you feel it first?", "worksheet_ta": "கோபத்தின்போது நீங்கள் கவனிக்கும் சரியான உடல் உணர்வுகளை விவரியுங்கள் — உங்கள் உடலில் எங்கு முதலில் அதை உணர்கிறீர்கள்?"}, {"title_en": "Interrupting the Cycle", "title_ta": "சுழற்சியை நிறுத்துதல்", "explanation_en": "You can interrupt the anger cycle at any of its four stages, but the thought stage is usually the easiest lever to pull — because it's the one you have the most conscious access to, even mid-anger.", "explanation_ta": "நீங்கள் கோப சுழற்சியை அதன் நான்கு நிலைகளில் எதிலும் நிறுத்தலாம், ஆனால் எண்ண நிலை பொதுவாக இழுக்க எளிதான கருவி — ஏனெனில் கோபத்தின் நடுவேயும் நீங்கள் அதிக நனவான அணுகல் கொண்டிருக்கும் நிலை அதுவே.", "example_en": "Instead of waiting for the trigger to stop happening, someone catches their own thought mid-argument — 'Wait, am I assuming the worst here?' — and that single question breaks the momentum toward an explosion.", "example_ta": "தூண்டுதல் நிகழ்வதை நிறுத்த காத்திருப்பதற்குப் பதிலாக, ஒருவர் வாக்குவாதத்தின் நடுவே தங்கள் சொந்த எண்ணத்தைப் பிடிக்கிறார் — 'காத்திருங்கள், நான் இங்கே மோசமானதை ஊகிக்கிறேனா?' — அந்த ஒரு கேள்வி வெடிப்பை நோக்கிய வேகத்தை உடைக்கிறது.", "tips_en": ["Practice mapping the cycle (trigger → thought → body → action) for real incidents, not just in theory.", "The earlier in the cycle you interrupt, the less energy it takes.", "It's normal to only catch the cycle after the fact at first — that's still progress."], "tips_ta": ["வெறும் கோட்பாட்டில் அல்ல, உண்மையான சம்பவங்களுக்கு சுழற்சியை (தூண்டுதல் → எண்ணம் → உடல் → செயல்) வரைபடமாக்கப் பயிற்சி செய்யுங்கள்.", "நீங்கள் சுழற்சியில் எவ்வளவு முன்னதாக நிறுத்துகிறீர்களோ, அவ்வளவு குறைவான ஆற்றல் தேவைப்படும்.", "முதலில் நிகழ்வுக்குப் பிறகுதான் சுழற்சியைப் பிடிப்பது இயல்பானது — அதுவும் முன்னேற்றம்தான்."], "improve_en": "If you only ever notice the cycle after an explosion, that's fine as a starting point — use the post-event review to slowly train yourself to catch it earlier next time.", "improve_ta": "நீங்கள் வெடிப்புக்குப் பிறகுதான் சுழற்சியை கவனித்தால், அது தொடக்க புள்ளியாக நல்லது — அடுத்த முறை அதை முன்னதாக பிடிக்க உங்களை மெதுவாகப் பயிற்றுவிக்க பிந்தைய நிகழ்வு மதிப்பாய்வைப் பயன்படுத்துங்கள்.", "steps_en": ["Map 3 real incidents this week using: Trigger → Thought → Body → Action.", "For each, mark where you could have interrupted the cycle earliest.", "Choose one specific interruption technique (a question, a breath, a pause) to try next time."], "steps_ta": ["இந்த வாரம் 3 உண்மையான சம்பவங்களை: தூண்டுதல் → எண்ணம் → உடல் → செயல் எனப் பயன்படுத்தி வரைபடமாக்குங்கள்.", "ஒவ்வொன்றிற்கும், சுழற்சியை நீங்கள் மிக முன்னதாக நிறுத்தியிருக்கக்கூடிய இடத்தைக் குறிக்கவும்.", "அடுத்த முறை முயற்சிக்க ஒரு குறிப்பிட்ட நிறுத்தும் நுட்பத்தை (ஒரு கேள்வி, ஒரு மூச்சு, ஒரு இடைவெளி) தேர்வு செய்யுங்கள்."], "worksheet_en": "Looking at your mapped cycle, which stage — trigger, thought, body, or action — feels easiest for you to interrupt, and why?", "worksheet_ta": "உங்கள் வரைபடமாக்கப்பட்ட சுழற்சியைப் பார்க்கும்போது, தூண்டுதல், எண்ணம், உடல், செயல் — எந்த நிலை நிறுத்த எளிதாக உணர்கிறது, ஏன்?"}]}, {"title_en": "In-the-Moment Cooling Techniques", "title_ta": "உடனடி அமைதி நுட்பங்கள்", "intro_en": "Once anger has fired, you cannot 'think' your way out of it in the first few seconds. What works instead are body-based techniques that lower physical intensity first, so clear thinking can follow.", "intro_ta": "கோபம் எழுந்தவுடன், முதல் சில வினாடிகளில் நீங்கள் 'சிந்தித்து' அதிலிருந்து மீள முடியாது. அதற்குப் பதிலாக முதலில் உடல் தீவிரத்தைக் குறைக்கும் உடல் அடிப்படையிலான நுட்பங்கள் வேலை செய்யும், அதன் பிறகு தெளிவான சிந்தனை தொடரும்.", "subtopics": [{"title_en": "The STOP Method", "title_ta": "STOP முறை", "explanation_en": "STOP stands for: Stop what you're doing, Take a breath, Observe your body and thoughts, Proceed with intention. It's a 4-second mental checkpoint you can use anywhere, anytime.", "explanation_ta": "STOP என்பது: நிறுத்து (நீங்கள் செய்வதை), மூச்சு எடு, கவனி (உங்கள் உடலையும் எண்ணங்களையும்), தொடர் (நோக்கத்துடன்) என்பதைக் குறிக்கிறது. இது எங்கும் எப்போதும் பயன்படுத்தக்கூடிய 4-வினாடி மனநிலை சோதனை புள்ளி.", "example_en": "In a heated family discussion, before snapping back, you mentally run: Stop (pause mid-sentence), Take a breath (one slow inhale), Observe (notice your jaw is clenched), Proceed (choose calmer words).", "example_ta": "பதட்டமான குடும்ப விவாதத்தின்போது, திரும்பிக் கோபப்படுவதற்கு முன், நீங்கள் மனதளவில் இயக்குகிறீர்கள்: நிறுத்து (வாக்கியத்தின் நடுவே இடைநிறுத்தம்), மூச்சு எடு (ஒரு மெதுவான உள்ளிழுப்பு), கவனி (உங்கள் தாடை இறுக்கமாக உள்ளதைக் கவனிக்கவும்), தொடர் (அமைதியான வார்த்தைகளைத் தேர்வு செய்யுங்கள்).", "tips_en": ["Practice STOP when calm first, so it's automatic when you actually need it.", "You can use STOP silently — no one needs to know you're doing it.", "Even doing just the first two letters (Stop, Take a breath) changes the outcome significantly."], "tips_ta": ["முதலில் அமைதியாக இருக்கும்போது STOPஐப் பயிற்சி செய்யுங்கள், அதனால் நீங்கள் உண்மையில் தேவைப்படும்போது அது தானியங்கியாக இருக்கும்.", "STOPஐ மௌனமாகப் பயன்படுத்தலாம் — நீங்கள் அதைச் செய்கிறீர்கள் என யாரும் தெரிந்துகொள்ள வேண்டியதில்லை.", "முதல் இரண்டு எழுத்துக்களை (நிறுத்து, மூச்சு எடு) மட்டும் செய்தாலும் முடிவை கணிசமாக மாற்றும்."], "improve_en": "If you tend to forget STOP mid-anger, write the word on a small card in your wallet or set it as your phone lock screen, as a visual trigger until it becomes automatic.", "improve_ta": "கோபத்தின் நடுவே STOPஐ மறந்துவிடும் போக்கு இருந்தால், அது தானியங்கியாகும் வரை உங்கள் பணப்பையில் ஒரு சிறிய அட்டையில் அல்லது உங்கள் ஃபோன் லாக் திரையில் அந்த வார்த்தையை காட்சி தூண்டுதலாக வைக்கவும்.", "steps_en": ["Practice the full STOP sequence 3 times today, even without a real trigger.", "Write the STOP steps somewhere you'll see them daily.", "Use STOP for real in the next trigger moment this week and note what happened."], "steps_ta": ["இன்று உண்மையான தூண்டுதல் இல்லாமலும் முழு STOP வரிசையை 3 முறை பயிற்சி செய்யுங்கள்.", "தினமும் பார்க்கும் இடத்தில் STOP படிகளை எழுதுங்கள்.", "இந்த வாரம் அடுத்த தூண்டுதல் தருணத்தில் உண்மையாக STOPஐப் பயன்படுத்தி என்ன நடந்தது எனக் குறிப்பிடுங்கள்."], "worksheet_en": "Try the STOP method once this week in a real moment. What changed compared to your usual reaction?", "worksheet_ta": "இந்த வாரம் ஒரு உண்மையான தருணத்தில் STOP முறையை முயற்சிக்கவும். உங்கள் வழக்கமான எதிர்வினையுடன் ஒப்பிடும்போது என்ன மாறியது?"}, {"title_en": "Breathing Techniques", "title_ta": "சுவாச நுட்பங்கள்", "explanation_en": "Slow diaphragmatic breathing — 4 seconds in, hold briefly, 6 seconds out — directly signals your nervous system to calm down. The longer exhale is key: it activates the body's natural relaxation response.", "explanation_ta": "மெதுவான வயிற்று சுவாசம் — 4 வினாடிகள் உள்ளிழுத்து, சிறிது நேரம் பிடித்து, 6 வினாடிகள் வெளியேற்றுதல் — உங்கள் நரம்பு மண்டலத்திற்கு அமைதியடையச் சமிக்ஞை செய்கிறது. நீண்ட வெளியேற்றம்தான் முக்கியம்: அது உடலின் இயல்பான தளர்வு பதிலை செயல்படுத்துகிறது.", "example_en": "Before replying to a triggering message, someone does 5 rounds of 4-in/6-out breathing at their desk — colleagues don't even notice, but their heart rate visibly settles by the end.", "example_ta": "தூண்டும் செய்திக்கு பதிலளிப்பதற்கு முன், ஒருவர் தங்கள் மேசையில் 5 சுற்று 4-உள்/6-வெளி சுவாசம் செய்கிறார் — சக ஊழியர்கள் கவனிக்கவே இல்லை, ஆனால் முடிவில் அவர்களின் இதயத் துடிப்பு தெளிவாக அமைகிறது.", "tips_en": ["Practice this breathing pattern for 2 minutes daily when calm, to build the habit.", "Breathe from your belly, not your chest, for the fullest calming effect.", "You don't need to close your eyes or look obvious — this can be done subtly anywhere."], "tips_ta": ["பழக்கத்தை உருவாக்க அமைதியாக இருக்கும்போது தினமும் 2 நிமிடங்கள் இந்த சுவாச முறையைப் பயிற்சி செய்யுங்கள்.", "முழுமையான அமைதியான விளைவுக்கு உங்கள் மார்பிலிருந்து அல்ல, வயிற்றிலிருந்து சுவாசியுங்கள்.", "உங்கள் கண்களை மூடவோ வெளிப்படையாகத் தெரியவோ தேவையில்லை — இதை எங்கும் நுட்பமாகச் செய்யலாம்."], "improve_en": "If 4-in/6-out feels hard to count under stress, simplify to just making your exhale noticeably longer than your inhale — the ratio matters more than exact numbers.", "improve_ta": "அழுத்தத்தின் கீழ் 4-உள்/6-வெளியை எண்ண கடினமாக இருந்தால், உங்கள் வெளியேற்றத்தை உங்கள் உள்ளிழுப்பை விட குறிப்பிடத்தக்க அளவு நீளமாக்குவதற்கு எளிமையாக்குங்கள் — சரியான எண்களை விட விகிதம் முக்கியம்.", "steps_en": ["Practice 4-in/6-out breathing for 2 minutes today while calm.", "Use it once this week during an actual triggering moment.", "Notice and note any change in your body's tension level afterward."], "steps_ta": ["இன்று அமைதியாக இருக்கும்போது 2 நிமிடங்கள் 4-உள்/6-வெளி சுவாசத்தைப் பயிற்சி செய்யுங்கள்.", "இந்த வாரம் ஒரு உண்மையான தூண்டும் தருணத்தில் அதைப் பயன்படுத்துங்கள்.", "பின்னர் உங்கள் உடலின் இறுக்க அளவில் ஏதேனும் மாற்றத்தைக் கவனித்துக் குறிப்பிடுங்கள்."], "worksheet_en": "After trying the breathing technique in a real moment, how did your body feel afterward compared to before?", "worksheet_ta": "உண்மையான தருணத்தில் சுவாச நுட்பத்தை முயற்சித்த பிறகு, முன்பை விட உங்கள் உடல் எப்படி உணர்ந்தது?"}, {"title_en": "The Planned Time-Out", "title_ta": "திட்டமிடப்பட்ட இடைவேளை", "explanation_en": "A planned time-out means stating clearly that you're stepping away and when you'll return — unlike silently walking off, which can feel like abandonment to the other person. This preserves trust while giving you space to cool down.", "explanation_ta": "திட்டமிடப்பட்ட இடைவேளை என்பது நீங்கள் விலகிச் செல்கிறீர்கள் என்றும் எப்போது திரும்புவீர்கள் என்றும் தெளிவாகச் சொல்வது — மௌனமாக நடந்து செல்வதற்கு மாறாக, இது மற்றவருக்கு கைவிடப்பட்டதைப் போல் உணரலாம். இது நம்பிக்கையைப் பாதுகாக்கும் அதே வேளையில் அமைதியடைய இடம் தருகிறது.", "example_en": "In a tense meeting, instead of storming out, you say: 'I need five minutes — I'll be back to continue this.' You step out, breathe, and return calmer and clearer.", "example_ta": "பதட்டமான கூட்டத்தில், கோபமாக வெளியேறுவதற்குப் பதிலாக, 'எனக்கு ஐந்து நிமிடம் வேண்டும் — நான் திரும்பி வந்து இதைத் தொடர்வேன்' என்று சொல்கிறீர்கள். வெளியே சென்று சுவாசித்து, அமைதியாகவும் தெளிவாகவும் திரும்புகிறீர்கள்.", "tips_en": ["Always state both the pause AND your return — this is what separates a healthy time-out from stonewalling.", "Choose a consistent phrase you'll use every time, so it becomes automatic.", "Use the time away actively — breathing or a short walk — not to rehearse angry comebacks."], "tips_ta": ["எப்போதும் இடைவேளையையும் உங்கள் திரும்புதலையும் சொல்லுங்கள் — இதுதான் ஆரோக்கியமான இடைவேளையையும் மௌன தண்டனையையும் பிரிக்கிறது.", "ஒவ்வொரு முறையும் பயன்படுத்த ஒரு நிலையான வாக்கியத்தைத் தேர்வு செய்யுங்கள், அதனால் அது தானியங்கியாகும்.", "விலகியிருக்கும் நேரத்தை செயலூக்கமாகப் பயன்படுத்துங்கள் — சுவாசம் அல்லது ஒரு குறுகிய நடை — கோபமான பதில்களை ஒத்திகை பார்க்க அல்ல."], "improve_en": "If your time-outs tend to stretch on without you actually returning, set a phone timer for the exact minutes you stated, so the other person can trust the boundary.", "improve_ta": "உங்கள் இடைவேளைகள் நீங்கள் உண்மையில் திரும்பாமல் நீண்டு செல்லும் போக்கு இருந்தால், நீங்கள் சொன்ன சரியான நிமிடங்களுக்கு ஒரு ஃபோன் டைமரை அமைக்கவும், அதனால் மற்றவர் எல்லையை நம்ப முடியும்.", "steps_en": ["Choose one exact time-out phrase you'll use, e.g. 'I need a few minutes, I'll come back to this.'", "Identify a physical anchor spot (a chair, the balcony) that's your designated cooling spot.", "Use this phrase for real once this week and follow through on returning."], "steps_ta": ["நீங்கள் பயன்படுத்தும் ஒரு துல்லியமான இடைவேளை வாக்கியத்தைத் தேர்ந்தெடுங்கள், எ.கா. 'எனக்கு சில நிமிடங்கள் வேண்டும், நான் இதற்குத் திரும்பி வருகிறேன்.'", "உங்கள் குறிப்பிட்ட அமைதி இடமாக ஒரு உடல் இருப்பிடத்தை (நாற்காலி, பால்கனி) அடையாளம் காணுங்கள்.", "இந்த வாரம் இந்த வாக்கியத்தை உண்மையாகப் பயன்படுத்தி திரும்பி வருவதைப் பின்பற்றுங்கள்."], "worksheet_en": "What exact phrase will you use for your next planned time-out, and where will you go?", "worksheet_ta": "உங்கள் அடுத்த திட்டமிடப்பட்ட இடைவேளைக்கு நீங்கள் எந்த வாக்கியத்தைப் பயன்படுத்துவீர்கள், எங்கு செல்வீர்கள்?"}]}, {"title_en": "Cognitive Restructuring — Rewiring Anger Thoughts", "title_ta": "சிந்தனை மறுசீரமைப்பு — கோப எண்ணங்களை மாற்றுதல்", "intro_en": "Certain thought patterns reliably fuel anger. This module teaches you to catch these 'hot thoughts,' understand which trap they fall into, and replace them with more balanced ones.", "intro_ta": "சில எண்ண முறைகள் நம்பகமாக கோபத்தைத் தூண்டுகின்றன. இந்த பாட நிலை இந்த 'சூடான எண்ணங்களை' பிடிக்கவும், அவை எந்த பொறியில் விழுகின்றன என்பதைப் புரிந்துகொள்ளவும், அவற்றை சமநிலையான எண்ணங்களால் மாற்றவும் கற்பிக்கிறது.", "subtopics": [{"title_en": "Spotting Hot Thoughts", "title_ta": "சூடான எண்ணங்களைக் கண்டறிதல்", "explanation_en": "Hot thoughts are the instant, extreme interpretations that flash through your mind during conflict — often before you're even aware of them. Learning to notice them is the first step to changing them.", "explanation_ta": "சூடான எண்ணங்கள் மோதலின்போது உங்கள் மனதில் மின்னும் உடனடி, தீவிர விளக்கங்கள் — பெரும்பாலும் நீங்கள் அவற்றை உணருவதற்கு முன்பே. அவற்றைக் கவனிக்கக் கற்றுக்கொள்வதுதான் அவற்றை மாற்றுவதற்கான முதல் படி.", "example_en": "In the middle of an argument, the thought 'They never listen to me' flashes through your mind — noticing this thought as it happens, rather than just feeling its effect, is the skill being built here.", "example_ta": "வாக்குவாதத்தின் நடுவே, 'அவர்கள் என் பேச்சை ஒருபோதும் கேட்பதில்லை' என்ற எண்ணம் உங்கள் மனதில் மின்னுகிறது — இதன் விளைவை உணர்வதற்கு பதிலாக, இது நிகழும்போதே இந்த எண்ணத்தைக் கவனிப்பதுதான் இங்கு உருவாக்கப்படும் திறன்.", "tips_en": ["Hot thoughts often contain words like 'always,' 'never,' 'should,' or 'everyone.'", "You don't need to stop the thought from arising — just notice it without immediately believing it.", "Writing the thought down, even briefly, creates useful distance from it."], "tips_ta": ["சூடான எண்ணங்களில் பெரும்பாலும் 'எப்போதும்,' 'ஒருபோதும்,' 'வேண்டும்,' 'எல்லோரும்' போன்ற வார்த்தைகள் இருக்கும்.", "எண்ணம் எழுவதை நிறுத்த வேண்டியதில்லை — வெறுமனே அதை உடனடியாக நம்பாமல் கவனியுங்கள்.", "எண்ணத்தை எழுதுவது, சுருக்கமாக இருந்தாலும், அதிலிருந்து பயனுள்ள தூரத்தை உருவாக்குகிறது."], "improve_en": "If hot thoughts feel too fast to catch, slow the process down by journaling right after any conflict, even an hour later — over time this trains you to notice them closer to real time.", "improve_ta": "சூடான எண்ணங்கள் பிடிக்க மிக வேகமாக உணரப்பட்டால், எந்த மோதலுக்குப் பிறகும், ஒரு மணி நேரம் கழித்தாவது, குறிப்பேடு எழுதுவதன் மூலம் செயல்முறையை மெதுவாக்குங்கள் — காலப்போக்கில் இது நிகழ் நேரத்திற்கு நெருக்கமாக அவற்றைக் கவனிக்க உங்களைப் பயிற்றுவிக்கும்.", "steps_en": ["Write down one hot thought you had during a recent conflict.", "Underline any absolute words ('always,' 'never,' 'should') in it.", "Practice noticing (not stopping) one hot thought in real time this week."], "steps_ta": ["சமீபத்திய மோதலின்போது நீங்கள் கொண்ட ஒரு சூடான எண்ணத்தை எழுதுங்கள்.", "அதில் உள்ள எந்த முழுமையான வார்த்தைகளையும் ('எப்போதும்,' 'ஒருபோதும்,' 'வேண்டும்') அடிக்கோடிடுங்கள்.", "இந்த வாரம் நிகழ் நேரத்தில் ஒரு சூடான எண்ணத்தைக் (நிறுத்தாமல்) கவனிக்கப் பயிற்சி செய்யுங்கள்."], "worksheet_en": "What's one hot thought that shows up often for you, and what absolute word does it usually contain?", "worksheet_ta": "உங்களுக்கு அடிக்கடி தோன்றும் ஒரு சூடான எண்ணம் என்ன, அதில் பொதுவாக எந்த முழுமையான வார்த்தை உள்ளது?"}, {"title_en": "The Four Thinking Traps", "title_ta": "நான்கு சிந்தனை பொறிகள்", "explanation_en": "Four common traps fuel anger: mind-reading (assuming intent without evidence), should-statements (rigid demands on others), catastrophizing (assuming the worst will keep happening), and labeling (reducing a person to one negative trait).", "explanation_ta": "நான்கு பொதுவான பொறிகள் கோபத்தைத் தூண்டுகின்றன: மனம் படித்தல் (ஆதாரமின்றி நோக்கத்தை ஊகித்தல்), வேண்டும் கூற்றுகள் (மற்றவர்கள் மீதான கடுமையான கோரிக்கைகள்), பேரழிவாக்கம் (மோசமானது தொடர்ந்து நடக்கும் என ஊகித்தல்), லேபிளிடுதல் (ஒரு நபரை ஒரே எதிர்மறை பண்பாகக் குறைத்தல்).", "example_en": "'My colleague never replies to my emails on time — they're so disrespectful' combines mind-reading (assuming disrespect) with labeling ('disrespectful') — both fueling more anger than the facts alone warrant.", "example_ta": "'என் சக ஊழியர் என் மின்னஞ்சலுக்கு சரியான நேரத்தில் பதிலளிப்பதில்லை — அவர்கள் மிகவும் அவமரியாதை' என்பது மனம் படித்தலை (அவமரியாதையை ஊகித்தல்) லேபிளிடுதலுடன் ('அவமரியாதை') இணைக்கிறது — இரண்டும் உண்மைகளை விட அதிக கோபத்தைத் தூண்டுகின்றன.", "tips_en": ["Learn to name which trap you're in — naming it reduces its power.", "Should-statements often hide an unspoken expectation you haven't actually communicated to the other person.", "Catastrophizing usually ignores all the times things DIDN'T go badly."], "tips_ta": ["நீங்கள் எந்த பொறியில் இருக்கிறீர்கள் என்பதைப் பெயரிடக் கற்றுக்கொள்ளுங்கள் — பெயரிடுவது அதன் சக்தியைக் குறைக்கிறது.", "வேண்டும் கூற்றுகள் பெரும்பாலும் நீங்கள் மற்றவரிடம் உண்மையில் தெரிவிக்காத ஒரு சொல்லப்படாத எதிர்பார்ப்பை மறைக்கின்றன.", "பேரழிவாக்கம் பொதுவாக விஷயங்கள் மோசமாக நடக்காத எல்லா நேரங்களையும் புறக்கணிக்கிறது."], "improve_en": "If you notice should-statements often, try converting them into direct requests instead: 'They should have told me' becomes 'I need to ask them to tell me next time.'", "improve_ta": "நீங்கள் அடிக்கடி வேண்டும் கூற்றுகளைக் கவனித்தால், அவற்றை நேரடி கோரிக்கைகளாக மாற்ற முயற்சிக்கவும்: 'அவர்கள் என்னிடம் சொல்லியிருக்க வேண்டும்' என்பது 'அடுத்த முறை அவர்களிடம் சொல்லச் சொல்ல வேண்டும்' என மாறுகிறது.", "steps_en": ["Identify which of the 4 traps you fall into most often.", "Find one recent example of that trap in your own thinking.", "Practice rewriting it without the trap's language."], "steps_ta": ["4 பொறிகளில் எதில் நீங்கள் அதிகம் விழுகிறீர்கள் என அடையாளம் காணுங்கள்.", "உங்கள் சொந்த சிந்தனையில் அந்த பொறியின் ஒரு சமீபத்திய உதாரணத்தைக் கண்டறியுங்கள்.", "பொறியின் மொழி இல்லாமல் அதை மீண்டும் எழுதப் பயிற்சி செய்யுங்கள்."], "worksheet_en": "Which of the four thinking traps do you fall into most, and what's a recent example?", "worksheet_ta": "நான்கு சிந்தனை பொறிகளில் எதில் நீங்கள் அதிகம் விழுகிறீர்கள், சமீபத்திய உதாரணம் என்ன?"}, {"title_en": "Building Balanced Thoughts", "title_ta": "சமநிலையான எண்ணங்களை உருவாக்குதல்", "explanation_en": "A balanced thought isn't fake positivity — it's simply more accurate and complete than the hot thought, accounting for missing context and alternative explanations.", "explanation_ta": "சமநிலையான எண்ணம் போலியான நேர்மறை எண்ணம் அல்ல — அது வெறுமனே சூடான எண்ணத்தை விட துல்லியமானது மற்றும் முழுமையானது, விடுபட்ட சூழலையும் மாற்று விளக்கங்களையும் கணக்கில் எடுத்துக்கொள்கிறது.", "example_en": "'My colleague is so selfish' (hot) becomes 'My colleague missed the deadline again — I don't know their full workload, and I can ask directly instead of assuming' (balanced) — accurate, not falsely positive.", "example_ta": "'என் சக ஊழியர் மிகவும் சுயநலவாதி' (சூடானது) என்பது 'என் சக ஊழியர் மீண்டும் கால அவகாசத்தைத் தவறவிட்டார் — அவர்களின் முழு வேலை சுமை எனக்குத் தெரியாது, ஊகிப்பதற்குப் பதிலாக நேரடியாகக் கேட்கலாம்' (சமநிலையானது) என மாறுகிறது — துல்லியமானது, தவறாக நேர்மறையானது அல்ல.", "tips_en": ["Ask 'what would I tell a friend who had this exact thought?' — you'll often be more balanced with others than yourself.", "A balanced thought can still acknowledge the problem — it just removes the extreme, unproven parts.", "It's okay if the balanced thought still includes some frustration — the goal is accuracy, not suppression."], "tips_ta": ["'இதே எண்ணம் கொண்ட ஒரு நண்பரிடம் நான் என்ன சொல்வேன்?' எனக் கேளுங்கள் — நீங்கள் பெரும்பாலும் உங்களை விட மற்றவர்களிடம் சமநிலையாக இருப்பீர்கள்.", "சமநிலையான எண்ணம் இன்னும் பிரச்சனையை ஒப்புக்கொள்ளலாம் — அது வெறுமனே தீவிரமான, நிரூபிக்கப்படாத பகுதிகளை நீக்குகிறது.", "சமநிலையான எண்ணத்தில் இன்னும் சில விரக்தி இருந்தால் பரவாயில்லை — நோக்கம் துல்லியம், அடக்குதல் அல்ல."], "improve_en": "If balanced thoughts feel forced or fake at first, that's normal — write 2-3 versions and pick the one that feels most true, not most positive.", "improve_ta": "சமநிலையான எண்ணங்கள் முதலில் கட்டாயமாகவோ போலியாகவோ உணரப்பட்டால், அது இயல்பானது — 2-3 பதிப்புகளை எழுதி, மிக நேர்மறையானதை அல்ல, மிக உண்மையானதாக உணரப்படுவதைத் தேர்வு செய்யுங்கள்.", "steps_en": ["Take the hot thought you wrote earlier and write one balanced alternative.", "Read both versions aloud and notice the difference in how each feels.", "Use the balanced version next time the same trigger occurs."], "steps_ta": ["நீங்கள் முன்பு எழுதிய சூடான எண்ணத்தை எடுத்து ஒரு சமநிலையான மாற்றை எழுதுங்கள்.", "இரண்டு பதிப்புகளையும் சத்தமாகப் படித்து ஒவ்வொன்றும் எப்படி உணரப்படுகிறது என்பதில் உள்ள வேறுபாட்டைக் கவனியுங்கள்.", "அதே தூண்டுதல் மீண்டும் நிகழும்போது சமநிலையான பதிப்பைப் பயன்படுத்துங்கள்."], "worksheet_en": "Write your hot thought and its balanced alternative side by side. Which feels more useful going forward?", "worksheet_ta": "உங்கள் சூடான எண்ணத்தையும் அதன் சமநிலையான மாற்றையும் அருகருகே எழுதுங்கள். இனிமேல் எது பயனுள்ளதாக உணரப்படுகிறது?"}]}, {"title_en": "Assertive Communication (Not Aggression)", "title_ta": "உறுதியான தொடர்பு (ஆக்ரோஷம் அல்ல)", "intro_en": "Assertive communication states your needs clearly and respectfully, without attacking. This module teaches the difference between passive, aggressive, and assertive styles, and gives you a practical formula to use.", "intro_ta": "உறுதியான தொடர்பு தாக்காமல் உங்கள் தேவைகளைத் தெளிவாகவும் மரியாதையாகவும் கூறுகிறது. இந்த பாட நிலை மென்மையான, ஆக்ரோஷமான, உறுதியான பாணிகளுக்கு இடையேயான வேறுபாட்டைக் கற்பிக்கிறது, பயன்படுத்த ஒரு நடைமுறை சூத்திரத்தையும் தருகிறது.", "subtopics": [{"title_en": "Passive vs Aggressive vs Assertive", "title_ta": "மென்மையான vs ஆக்ரோஷமான vs உறுதியான", "explanation_en": "Passive communication swallows your own needs to avoid conflict. Aggressive communication attacks the other person to get your way. Assertive communication states your needs clearly while respecting the other person — it's the only style that builds long-term trust.", "explanation_ta": "மென்மையான தொடர்பு மோதலைத் தவிர்க்க உங்கள் சொந்த தேவைகளை விழுங்குகிறது. ஆக்ரோஷமான தொடர்பு உங்கள் வழியைப் பெற மற்றவரைத் தாக்குகிறது. உறுதியான தொடர்பு மற்றவரை மதிக்கும் அதே வேளையில் உங்கள் தேவைகளைத் தெளிவாகக் கூறுகிறது — இதுவே நீண்டகால நம்பிக்கையை உருவாக்கும் ஒரே பாணி.", "example_en": "Passive: staying silent when a friend cancels plans last-minute again. Aggressive: 'You're so unreliable, I can never count on you!' Assertive: 'I feel let down when plans change last minute — can we agree on more notice going forward?'", "example_ta": "மென்மையானது: ஒரு நண்பர் மீண்டும் கடைசி நிமிடத்தில் திட்டங்களை ரத்து செய்யும்போது மௌனமாக இருப்பது. ஆக்ரோஷமானது: 'நீங்கள் மிகவும் நம்பகமற்றவர், உன்னை என்னால் ஒருபோதும் நம்ப முடியாது!' உறுதியானது: 'கடைசி நிமிடத்தில் திட்டங்கள் மாறும்போது நான் ஏமாற்றமடைகிறேன் — இனிமேல் அதிக முன்னறிவிப்பு பற்றி ஒப்புக்கொள்ளலாமா?'", "tips_en": ["Notice which style you default to with different people — you may be passive at work but aggressive at home, or vice versa.", "Assertive communication feels uncomfortable at first if you're used to passive or aggressive patterns — that discomfort fades with practice.", "Being assertive doesn't guarantee the other person will respond well — but it gives the relationship its best chance."], "tips_ta": ["வெவ்வேறு நபர்களுடன் நீங்கள் இயல்பாகப் பின்பற்றும் பாணியைக் கவனியுங்கள் — நீங்கள் வேலையில் மென்மையாகவும் வீட்டில் ஆக்ரோஷமாகவும் இருக்கலாம், அல்லது நேர்மாறாகவும்.", "நீங்கள் மென்மையான அல்லது ஆக்ரோஷமான முறைகளுக்குப் பழக்கப்பட்டிருந்தால் உறுதியான தொடர்பு முதலில் சங்கடமாக உணரப்படும் — அந்த சங்கடம் பயிற்சியுடன் மறையும்.", "உறுதியாக இருப்பது மற்றவர் நன்றாக பதிலளிப்பார் என்பதற்கு உத்தரவாதம் அளிக்காது — ஆனால் அது உறவுக்கு அதன் சிறந்த வாய்ப்பைத் தருகிறது."], "improve_en": "If you tend toward passive communication, start with low-stakes situations (ordering food, small preferences) to practice stating your needs before moving to bigger conflicts.", "improve_ta": "நீங்கள் மென்மையான தொடர்புக்கு நோக்கியிருந்தால், பெரிய மோதல்களுக்குச் செல்வதற்கு முன் உங்கள் தேவைகளைக் கூறப் பயிற்சி செய்ய குறைந்த இடர் சூழல்களில் (உணவு ஆர்டர் செய்தல், சிறிய விருப்பங்கள்) தொடங்குங்கள்.", "steps_en": ["Identify your default style — passive, aggressive, or assertive — in one specific relationship.", "Recall one recent moment where you used that style.", "Rewrite what you said or wish you'd said in assertive language."], "steps_ta": ["ஒரு குறிப்பிட்ட உறவில் உங்கள் இயல்பான பாணியை — மென்மையான, ஆக்ரோஷமான, உறுதியான — அடையாளம் காணுங்கள்.", "நீங்கள் அந்த பாணியைப் பயன்படுத்திய ஒரு சமீபத்திய தருணத்தை நினைவுகூருங்கள்.", "நீங்கள் சொன்னதை அல்லது சொல்லியிருக்க வேண்டும் என விரும்பியதை உறுதியான மொழியில் மீண்டும் எழுதுங்கள்."], "worksheet_en": "With which person in your life are you least assertive, and what's one small step toward changing that?", "worksheet_ta": "உங்கள் வாழ்க்கையில் எந்த நபரிடம் நீங்கள் மிகக் குறைவாக உறுதியாக இருக்கிறீர்கள், அதை மாற்ற ஒரு சிறிய படி என்ன?"}, {"title_en": "The 'I Feel' Statement Formula", "title_ta": "'நான் உணர்கிறேன்' வாக்கிய சூத்திரம்", "explanation_en": "The formula 'I feel [emotion] when [specific situation], and I need [specific request]' keeps the focus on your experience rather than accusing the other person, which reduces defensiveness.", "explanation_ta": "'Y நடக்கும்போது எனக்கு [உணர்ச்சி] உணர்வு ஏற்படுகிறது, எனக்கு [குறிப்பிட்ட கோரிக்கை] தேவை' என்ற சூத்திரம் மற்றவரைக் குற்றம் சாட்டுவதற்குப் பதிலாக உங்கள் அனுபவத்தில் கவனத்தை வைக்கிறது, இது பாதுகாப்பு மனப்பான்மையைக் குறைக்கிறது.", "example_en": "Instead of 'You never listen to me!' try: 'I feel unheard when I'm interrupted mid-sentence, and I need us to let each other finish before responding.'", "example_ta": "'நீங்கள் என் பேச்சை ஒருபோதும் கேட்பதில்லை!' என்பதற்குப் பதிலாக: 'நடுவில் குறுக்கிடப்படும்போது நான் கேட்கப்படாதவனாக உணர்கிறேன், நாம் ஒருவருக்கொருவர் முடிக்க அனுமதிக்க வேண்டும்' எனச் சொல்லுங்கள்.", "tips_en": ["Keep the situation specific ('when I'm interrupted') rather than general ('when you're rude').", "Name the actual emotion (unheard, worried, disrespected) rather than a vague 'bad.'", "Make the request concrete and actionable, not just a complaint."], "tips_ta": ["சூழலை பொதுவானதாக ('நீங்கள் முரட்டுத்தனமாக இருக்கும்போது') அல்லாமல் குறிப்பிட்டதாக ('நடுவில் குறுக்கிடப்படும்போது') வைத்திருங்கள்.", "தெளிவற்ற 'மோசமான' என்பதற்குப் பதிலாக உண்மையான உணர்ச்சியை (கேட்கப்படாதது, கவலை, அவமதிக்கப்படுதல்) பெயரிடுங்கள்.", "கோரிக்கையை வெறும் புகார் அல்லாமல் உறுதியானதாகவும் செயல்படக்கூடியதாகவும் ஆக்குங்கள்."], "improve_en": "If your 'I feel' statements still sound accusatory, check for hidden 'you' blame disguised as feeling — 'I feel like you don't care' is actually still an accusation. Try 'I feel worried' instead.", "improve_ta": "உங்கள் 'நான் உணர்கிறேன்' கூற்றுகள் இன்னும் குற்றம் சாட்டுவது போல் இருந்தால், உணர்வாக மறைக்கப்பட்ட மறைமுக 'நீங்கள்' குற்றத்தைச் சரிபார்க்கவும் — 'நீங்கள் கவலைப்படவில்லை என நான் உணர்கிறேன்' என்பது உண்மையில் இன்னும் ஒரு குற்றச்சாட்டு. அதற்குப் பதிலாக 'நான் கவலைப்படுகிறேன்' எனச் சொல்லுங்கள்.", "steps_en": ["Write an 'I feel ___ when ___, and I need ___' statement for one current conflict in your life.", "Practice saying it out loud alone before using it in the real conversation.", "Use it in a real conversation this week and note the response."], "steps_ta": ["உங்கள் வாழ்க்கையில் தற்போதைய ஒரு மோதலுக்கு 'எனக்கு ___ உணர்வு ___ போது ஏற்படுகிறது, எனக்கு ___ தேவை' என்ற வாக்கியத்தை எழுதுங்கள்.", "உண்மையான உரையாடலில் பயன்படுத்தும் முன் தனியாக சத்தமாகப் பேசி பயிற்சி செய்யுங்கள்.", "இந்த வாரம் ஒரு உண்மையான உரையாடலில் அதைப் பயன்படுத்தி பதிலைக் குறிப்பிடுங்கள்."], "worksheet_en": "Write your 'I feel / I need' statement for your most common conflict. How does it feel different from what you'd normally say?", "worksheet_ta": "உங்கள் மிகவும் பொதுவான மோதலுக்கான 'நான் உணர்கிறேன் / எனக்குத் தேவை' வாக்கியத்தை எழுதுங்கள். நீங்கள் வழக்கமாகச் சொல்வதிலிருந்து இது எப்படி வேறுபட்டதாக உணரப்படுகிறது?"}, {"title_en": "Handling Pushback Assertively", "title_ta": "எதிர்ப்பை உறுதியாக கையாளுதல்", "explanation_en": "Even a well-worded assertive statement can meet resistance or defensiveness. Staying assertive means calmly repeating your core need (like a broken record) without escalating to aggression or retreating to passivity.", "explanation_ta": "நன்கு சொல்லப்பட்ட உறுதியான கூற்று கூட எதிர்ப்பையோ பாதுகாப்பு மனப்பான்மையையோ சந்திக்கலாம். உறுதியாக இருப்பது என்பது ஆக்ரோஷத்திற்கு தீவிரமடையாமலோ மென்மைக்குத் திரும்பாமலோ உங்கள் முக்கிய தேவையை (உடைந்த பதிவு போல்) அமைதியாக மீண்டும் சொல்வது.", "example_en": "When your assertive request is met with 'You're overreacting,' instead of escalating or backing down, you calmly repeat: 'I hear that you see it differently — I still need us to let each other finish speaking.'", "example_ta": "உங்கள் உறுதியான கோரிக்கை 'நீங்கள் அதிகமாக எதிர்வினையாற்றுகிறீர்கள்' என்பதைச் சந்திக்கும்போது, தீவிரமடையாமலோ பின்வாங்காமலோ, நீங்கள் அமைதியாக மீண்டும் சொல்கிறீர்கள்: 'நீங்கள் அதை வித்தியாசமாகப் பார்க்கிறீர்கள் என்பதை நான் கேட்கிறேன் — நமக்கு இன்னும் ஒருவருக்கொருவர் முடிக்க அனுமதிக்க வேண்டும்.'", "tips_en": ["Prepare for pushback in advance — it's common, not a sign you did something wrong.", "Repeat your core need in slightly different words rather than arguing every counter-point.", "It's okay to end a conversation calmly if the other person won't engage respectfully — 'Let's continue this later' is a valid assertive move."], "tips_ta": ["எதிர்ப்புக்கு முன்கூட்டியே தயாராகுங்கள் — இது பொதுவானது, நீங்கள் தவறு செய்தீர்கள் என்பதற்கான அறிகுறி அல்ல.", "ஒவ்வொரு எதிர் கருத்துடனும் வாதிடுவதற்குப் பதிலாக உங்கள் முக்கிய தேவையை சற்று வேறுபட்ட வார்த்தைகளில் மீண்டும் சொல்லுங்கள்.", "மற்றவர் மரியாதையுடன் ஈடுபடவில்லை என்றால் அமைதியாக ஒரு உரையாடலை முடிப்பது சரி — 'இதைப் பின்னர் தொடர்வோம்' என்பது ஒரு செல்லுபடியாகும் உறுதியான நகர்வு."], "improve_en": "If you tend to give up quickly when faced with pushback, prepare your 'repeat phrase' in advance so you have it ready rather than improvising in the moment.", "improve_ta": "எதிர்ப்பை எதிர்கொள்ளும்போது நீங்கள் விரைவாக விட்டுக்கொடுக்கும் போக்கு இருந்தால், தருணத்தில் திட்டமிடாமல் இருக்க உங்கள் 'மீண்டும் சொல்லும் வாக்கியத்தை' முன்கூட்டியே தயார் செய்யுங்கள்.", "steps_en": ["Think of a conflict where pushback derailed your assertive attempt.", "Write a calm 'repeat phrase' you could have used instead.", "Practice saying it out loud 3 times so it's ready for next time."], "steps_ta": ["எதிர்ப்பு உங்கள் உறுதியான முயற்சியைத் தடம் புரளச் செய்த ஒரு மோதலை நினைத்துப் பாருங்கள்.", "அதற்குப் பதிலாக நீங்கள் பயன்படுத்தியிருக்கக்கூடிய ஒரு அமைதியான 'மீண்டும் சொல்லும் வாக்கியத்தை' எழுதுங்கள்.", "அடுத்த முறைக்குத் தயாராக இருக்க அதை 3 முறை சத்தமாகச் சொல்லப் பயிற்சி செய்யுங்கள்."], "worksheet_en": "What's your prepared 'repeat phrase' for the next time someone pushes back on an assertive request?", "worksheet_ta": "யாராவது ஒரு உறுதியான கோரிக்கையை எதிர்க்கும் அடுத்த முறைக்கு உங்கள் தயாரான 'மீண்டும் சொல்லும் வாக்கியம்' என்ன?"}]}, {"title_en": "Anger in Relationships & Family", "title_ta": "உறவுகளிலும் குடும்பத்திலும் கோபம்", "intro_en": "Anger with people we love hits differently — the stakes feel higher and old wounds resurface fast. This module covers repairing after a blow-up and reducing recurring family conflict.", "intro_ta": "நாம் நேசிக்கும் மக்களுடன் கோபம் வித்தியாசமாகத் தாக்குகிறது — பங்கயம் அதிகமாகத் தோன்றும், பழைய காயங்கள் வேகமாக மீண்டும் வெளிப்படும். இந்த பாட நிலை வெடிப்புக்குப் பிறகு சரிசெய்தலையும் மீண்டும் வரும் குடும்ப மோதலைக் குறைப்பதையும் உள்ளடக்கியது.", "subtopics": [{"title_en": "Repair After a Blow-Up", "title_ta": "வெடிப்புக்குப் பிறகு சரிசெய்தல்", "explanation_en": "A genuine repair owns your specific part without over-apologizing (excessive self-blame) or under-apologizing (minimizing what happened). It names what you did, why it wasn't fair, and doesn't demand the other person also apologize in return.", "explanation_ta": "உண்மையான சரிசெய்தல் அதிகமாக மன்னிப்புக் கேட்காமலோ (அதிகப்படியான சுய குற்றச்சாட்டு) குறைவாக மன்னிப்புக் கேட்காமலோ (நடந்ததைக் குறைத்து மதிப்பிடுதல்) உங்கள் குறிப்பிட்ட பங்கை ஏற்றுக்கொள்கிறது. நீங்கள் என்ன செய்தீர்கள், ஏன் அது நியாயமில்லை என்பதைப் பெயரிடுகிறது, மற்றவரும் திரும்பப் பதிலுக்கு மன்னிப்புக் கேட்க வேண்டும் என்று கோராது.", "example_en": "After snapping at your spouse, instead of 'I'm sorry you felt that way' (which blames them), try: 'I'm sorry I raised my voice — that wasn't fair to you, even though I was frustrated.'", "example_ta": "உங்கள் துணையிடம் கோபப்பட்ட பின், 'நீங்கள் அப்படி உணர்ந்ததற்கு வருந்துகிறேன்' (இது அவர்களைக் குற்றம் சாட்டுகிறது) என்பதற்குப் பதிலாக: 'நான் குரல் உயர்த்தியதற்கு வருந்துகிறேன் — நான் விரக்தியடைந்திருந்தாலும், அது உங்களுக்கு நியாயமில்லை' எனச் சொல்லுங்கள்.", "tips_en": ["Repair sooner rather than later — the same day if possible, before resentment sets in on either side.", "Name the specific action ('raised my voice'), not a vague 'I'm sorry for everything.'", "A repair doesn't require the other person to immediately forgive or respond — give them space too."], "tips_ta": ["மனக்குறை இரு பக்கமும் அமையும் முன், சாத்தியமானால் அதே நாளில், தாமதிக்காமல் சரிசெய்யுங்கள்.", "தெளிவற்ற 'எல்லாவற்றுக்கும் வருந்துகிறேன்' அல்லாமல் குறிப்பிட்ட செயலை ('குரல் உயர்த்தியது') பெயரிடுங்கள்.", "சரிசெய்தல் மற்றவர் உடனடியாக மன்னிக்க வேண்டும் அல்லது பதிலளிக்க வேண்டும் என்பதைத் தேவைப்படுத்தாது — அவர்களுக்கும் இடம் கொடுங்கள்."], "improve_en": "If your apologies tend to sound like 'I'm sorry, but...' followed by justifying yourself, practice stopping right after naming what you did wrong — save any context for a separate, later conversation.", "improve_ta": "உங்கள் மன்னிப்புகள் 'மன்னிக்கவும், ஆனால்...' எனத் தொடர்ந்து உங்களை நியாயப்படுத்துவது போல் இருந்தால், நீங்கள் தவறு செய்ததைப் பெயரிட்ட உடனேயே நிறுத்தப் பயிற்சி செய்யுங்கள் — எந்த சூழலையும் தனியான, பிந்தைய உரையாடலுக்கு சேமித்து வைக்கவும்.", "steps_en": ["Think of one past blow-up you haven't properly repaired.", "Write a repair phrase: 'I'm sorry for ___, that wasn't fair, even though I felt ___.'", "Deliver this repair to the person this week, in person or by message."], "steps_ta": ["சரியாக சரிசெய்யப்படாத ஒரு கடந்தகால வெடிப்பை நினைத்துப் பாருங்கள்.", "ஒரு சரிசெய்யும் வாக்கியத்தை எழுதுங்கள்: 'நான் ___க்கு வருந்துகிறேன், நான் ___ உணர்ந்தாலும் அது நியாயமில்லை.'", "இந்த வாரம் இந்த சரிசெய்தலை நேரடியாகவோ செய்தி மூலமாகவோ அந்த நபருக்கு வழங்குங்கள்."], "worksheet_en": "Which past blow-up still needs a genuine repair, and what specific words will you use?", "worksheet_ta": "எந்த கடந்தகால வெடிப்புக்கு இன்னும் உண்மையான சரிசெய்தல் தேவை, என்ன குறிப்பிட்ட வார்த்தைகளைப் பயன்படுத்துவீர்கள்?"}, {"title_en": "Identifying Recurring Conflict Topics", "title_ta": "மீண்டும் வரும் மோதல் தலைப்புகளை அடையாளம் காணுதல்", "explanation_en": "Most family conflict circles around just 2–3 real topics wearing different disguises. Spotting the underlying pattern — rather than reacting to each surface argument separately — is far more effective.", "explanation_ta": "பெரும்பாலான குடும்ப மோதல் வெவ்வேறு வேடங்களில் வெறும் 2–3 உண்மையான தலைப்புகளைச் சுற்றி வருகிறது. ஒவ்வொரு மேல்நிலை வாக்குவாதத்திற்கும் தனித்தனியாக எதிர்வினையாற்றுவதை விட, அடிப்படை முறையைக் கண்டறிவது மிகவும் பயனுள்ளதாக இருக்கும்.", "example_en": "An argument about dishes, then about being late, then about money — on the surface these look unrelated, but the recurring theme underneath might actually be 'feeling like my effort isn't noticed.'", "example_ta": "பாத்திரங்கள் பற்றிய வாக்குவாதம், பின் தாமதம் பற்றி, பின் பணம் பற்றி — மேலோட்டமாக இவை தொடர்பில்லாதவை போல் தோன்றினாலும், அடியில் மீண்டும் வரும் கருப்பொருள் உண்மையில் 'என் முயற்சி கவனிக்கப்படவில்லை என உணர்தல்' ஆக இருக்கலாம்.", "tips_en": ["Look back at your last 5–6 arguments and ask what they actually had in common.", "The real topic is often about a need (respect, appreciation, fairness) rather than the surface subject (dishes, time, money).", "Once you spot the real topic, future surface arguments become much easier to defuse quickly."], "tips_ta": ["உங்கள் கடைசி 5–6 வாக்குவாதங்களைத் திரும்பிப் பார்த்து, அவற்றுக்கு உண்மையில் என்ன பொதுவானது என்று கேளுங்கள்.", "உண்மையான தலைப்பு பெரும்பாலும் மேலோட்ட விஷயத்தை (பாத்திரங்கள், நேரம், பணம்) விட ஒரு தேவையைப் (மரியாதை, பாராட்டு, நியாயம்) பற்றியது.", "நீங்கள் உண்மையான தலைப்பைக் கண்டறிந்தவுடன், எதிர்கால மேலோட்ட வாக்குவாதங்களை விரைவாகத் தணிப்பது மிகவும் எளிதாகும்."], "improve_en": "If you can't immediately see the pattern, ask the other person directly: 'When we argue about X, do you think there's something bigger going on underneath?' — they may see it more clearly than you.", "improve_ta": "நீங்கள் உடனடியாக முறையைப் பார்க்க முடியாவிட்டால், மற்றவரிடம் நேரடியாகக் கேளுங்கள்: 'நாம் X பற்றி வாக்குவாதிக்கும்போது, அடியில் ஏதோ பெரியது நடக்கிறது என நினைக்கிறீர்களா?' — அவர்கள் உங்களை விட தெளிவாகப் பார்க்கலாம்.", "steps_en": ["List the 2–3 topics that come up most often in your family arguments.", "For each, write what deeper need it might really be about.", "Choose a calm time this week to name the deeper pattern to the other person."], "steps_ta": ["உங்கள் குடும்ப வாக்குவாதங்களில் அடிக்கடி வரும் 2–3 தலைப்புகளைப் பட்டியலிடுங்கள்.", "ஒவ்வொன்றிற்கும், அது உண்மையில் எந்த ஆழமான தேவையைப் பற்றியிருக்கலாம் என்பதை எழுதுங்கள்.", "இந்த வாரம் ஆழமான முறையை மற்றவரிடம் பெயரிட ஒரு அமைதியான நேரத்தைத் தேர்வு செய்யுங்கள்."], "worksheet_en": "What are the 2–3 recurring topics behind most of your family conflicts, and what deeper need might connect them?", "worksheet_ta": "உங்கள் குடும்ப மோதல்களுக்குப் பின்னால் உள்ள 2–3 மீண்டும் வரும் தலைப்புகள் என்ன, அவற்றை இணைக்கும் ஆழமான தேவை என்ன?"}, {"title_en": "Preventive Conversations", "title_ta": "தடுப்பு உரையாடல்கள்", "explanation_en": "Raising a recurring topic during a calm moment — not mid-argument — makes real problem-solving possible, because both people's logical brains are actually online.", "explanation_ta": "ஒரு மீண்டும் வரும் தலைப்பை அமைதியான தருணத்தில் — வாக்குவாதத்தின் நடுவே அல்ல — எழுப்புவது உண்மையான பிரச்சனை தீர்வை சாத்தியமாக்குகிறது, ஏனெனில் இரு நபர்களின் தர்க்க மூளையும் உண்மையில் ஆன்லைனில் உள்ளது.", "example_en": "Instead of waiting for the next dishes argument, someone schedules a calm 20-minute chat over tea specifically to talk about how household tasks are divided — leading to an actual agreement instead of another blow-up.", "example_ta": "அடுத்த பாத்திரங்கள் வாக்குவாதத்திற்காகக் காத்திருப்பதற்குப் பதிலாக, ஒருவர் வீட்டு வேலைகள் எப்படிப் பிரிக்கப்படுகின்றன என்பதைப் பற்றி பேச குறிப்பாக தேநீருடன் அமைதியான 20-நிமிட உரையாடலைத் திட்டமிடுகிறார் — மற்றொரு வெடிப்புக்குப் பதிலாக உண்மையான ஒப்பந்தத்தில் முடிகிறது.", "tips_en": ["Pick a genuinely calm moment — not right after either of you has been stressed by something else.", "Frame it as 'I want us to figure this out together' rather than a list of grievances.", "Agree on one small concrete change to try, not a total overhaul all at once."], "tips_ta": ["உண்மையிலேயே அமைதியான தருணத்தைத் தேர்வு செய்யுங்கள் — வேறு ஏதோ ஒன்றால் இருவரும் அழுத்தத்திற்கு உள்ளானதற்குப் பிறகு அல்ல.", "குறைகளின் பட்டியலாக அல்லாமல் 'நாம் இதைச் சேர்ந்து கண்டுபிடிக்க விரும்புகிறேன்' என வடிவமைக்கவும்.", "ஒரே நேரத்தில் முழுமையான மறுசீரமைப்பு அல்ல, முயற்சிக்க ஒரு சிறிய உறுதியான மாற்றத்தில் உடன்படுங்கள்."], "improve_en": "If preventive conversations feel awkward to initiate, start with a soft opener like 'Can we talk about something when you have a few minutes? Nothing urgent, just want us to be on the same page.'", "improve_ta": "தடுப்பு உரையாடல்களைத் தொடங்குவது சங்கடமாக உணரப்பட்டால், 'உங்களிடம் சில நிமிடங்கள் இருக்கும்போது ஏதாவது பேசலாமா? அவசரமில்லை, நாம் ஒரே பக்கத்தில் இருக்க வேண்டும் என்று விரும்புகிறேன்' போன்ற மென்மையான தொடக்கத்துடன் தொடங்குங்கள்.", "steps_en": ["Choose one recurring topic from the previous subtopic.", "Schedule a specific calm time this week to discuss it (not during any conflict).", "Come to that conversation with one small concrete suggestion to try."], "steps_ta": ["முந்தைய துணை தலைப்பிலிருந்து ஒரு மீண்டும் வரும் தலைப்பைத் தேர்வு செய்யுங்கள்.", "இதைப் பற்றி விவாதிக்க இந்த வாரம் ஒரு குறிப்பிட்ட அமைதியான நேரத்தைத் திட்டமிடுங்கள் (எந்த மோதலின்போதும் அல்ல).", "முயற்சிக்க ஒரு சிறிய உறுதியான ஆலோசனையுடன் அந்த உரையாடலுக்கு வாருங்கள்."], "worksheet_en": "What recurring topic will you raise proactively this week, and when will you have that conversation?", "worksheet_ta": "இந்த வாரம் நீங்கள் எந்த மீண்டும் வரும் தலைப்பை முன்னெடுத்து எழுப்புவீர்கள், அந்த உரையாடலை எப்போது நடத்துவீர்கள்?"}]}, {"title_en": "Anger at Work & Under Pressure", "title_ta": "வேலையிலும் அழுத்தத்திலும் கோபம்", "intro_en": "Workplace anger has extra constraints — you usually can't walk away or say exactly what you feel. This module covers separating people from problems, managing triggering messages, and choosing your battles.", "intro_ta": "பணியிடத்தில் கோபத்திற்கு கூடுதல் கட்டுப்பாடுகள் உள்ளன — பொதுவாக நீங்கள் வெளியேற முடியாது அல்லது உணர்வதை சரியாகச் சொல்ல முடியாது. இந்த பாட நிலை நபர்களையும் பிரச்சனைகளையும் பிரிப்பது, தூண்டும் செய்திகளை நிர்வகித்தல், உங்கள் போராட்டங்களைத் தேர்ந்தெடுப்பது ஆகியவற்றை உள்ளடக்கியது.", "subtopics": [{"title_en": "Separating the Person from the Problem", "title_ta": "நபரையும் பிரச்சனையையும் பிரித்தல்", "explanation_en": "It's easy to turn 'this deadline is unreasonable' into 'my manager is a tyrant.' Separating the person from the problem keeps you focused on what's actually fixable, and prevents relationships from becoming collateral damage.", "explanation_ta": "'இந்த கால அவகாசம் நியாயமற்றது' என்பதை 'என் மேலாளர் கொடுங்கோலன்' என மாற்றுவது எளிது. நபரையும் பிரச்சனையையும் பிரிப்பது உண்மையில் சரிசெய்யக்கூடியதில் உங்கள் கவனத்தை வைத்திருக்கிறது, உறவுகள் இணை சேதமாக மாறுவதைத் தடுக்கிறது.", "example_en": "Instead of thinking 'my manager doesn't respect my time,' reframe to 'this project timeline is genuinely too tight — let me raise that as a scheduling issue, not a personal attack.'", "example_ta": "'என் மேலாளர் என் நேரத்தை மதிக்கவில்லை' என்று நினைப்பதற்குப் பதிலாக, 'இந்த திட்ட கால அட்டவணை உண்மையிலேயே மிகவும் இறுக்கமானது — அதை ஒரு தனிப்பட்ட தாக்குதலாக அல்ல, ஒரு அட்டவணை பிரச்சனையாக எழுப்புகிறேன்' என மறுவடிவமைக்கவும்.", "tips_en": ["Ask: 'Is this actually about the person, or about the system/situation they're operating in?'", "Address the problem directly rather than venting about the person to others.", "Even difficult people are usually responding to pressures you can't fully see."], "tips_ta": ["'இது உண்மையில் நபரைப் பற்றியதா, அல்லது அவர்கள் இயங்கும் அமைப்பு/சூழலைப் பற்றியதா?' எனக் கேளுங்கள்.", "நபரைப் பற்றி மற்றவர்களிடம் வெளிப்படுத்துவதற்குப் பதிலாக பிரச்சனையை நேரடியாக நிவர்த்தி செய்யுங்கள்.", "கடினமான நபர்கள் கூட பொதுவாக நீங்கள் முழுமையாகப் பார்க்க முடியாத அழுத்தங்களுக்குப் பதிலளிக்கிறார்கள்."], "improve_en": "If you notice yourself labeling a colleague negatively in your head, pause and try rephrasing the problem in terms of the situation instead of their character.", "improve_ta": "நீங்கள் உங்கள் மனதில் ஒரு சக ஊழியரை எதிர்மறையாக லேபிளிடுவதைக் கவனித்தால், நிறுத்தி, அவர்களின் குணத்திற்குப் பதிலாக சூழலின் அடிப்படையில் பிரச்சனையை மறுவார்த்தையாக்க முயற்சிக்கவும்.", "steps_en": ["Recall a recent work frustration where you blamed a person.", "Rewrite the situation focusing only on the actual problem, not the person's character.", "Next time this comes up, address the problem directly with the person calmly."], "steps_ta": ["நீங்கள் ஒரு நபரைக் குற்றம் சாட்டிய ஒரு சமீபத்திய வேலை விரக்தியை நினைவுகூருங்கள்.", "நபரின் குணத்தை அல்ல, உண்மையான பிரச்சனையை மட்டும் மையமாகக் கொண்டு சூழலை மீண்டும் எழுதுங்கள்.", "இது மீண்டும் வரும்போது, அமைதியாக நபருடன் நேரடியாக பிரச்சனையை நிவர்த்தி செய்யுங்கள்."], "worksheet_en": "Think of a workplace frustration where you blamed a person's character. What's the actual, fixable problem underneath?", "worksheet_ta": "நீங்கள் ஒரு நபரின் குணத்தைக் குற்றம் சாட்டிய ஒரு பணியிட விரக்தியை நினைத்துப் பாருங்கள். அடியில் உள்ள உண்மையான, சரிசெய்யக்கூடிய பிரச்சனை என்ன?"}, {"title_en": "The 10-Minute Rule for Messages", "title_ta": "செய்திகளுக்கான 10-நிமிட விதி", "explanation_en": "A curt email or message can spike anger instantly. Waiting at least 10 minutes before replying — drafting first, sending later — consistently produces better outcomes than immediate responses.", "explanation_ta": "ஒரு கடுமையான மின்னஞ்சல் அல்லது செய்தி உடனடியாக கோபத்தை அதிகரிக்கலாம். பதிலளிப்பதற்கு முன் குறைந்தது 10 நிமிடங்கள் காத்திருப்பது — முதலில் வரைவு செய்து, பின்னர் அனுப்புவது — உடனடி பதில்களை விட தொடர்ந்து சிறந்த முடிவுகளைத் தருகிறது.", "example_en": "You receive a curt email from your manager. Instead of replying immediately, you draft the reply, close the laptop for 10 minutes, then re-read and soften the tone before sending.", "example_ta": "உங்கள் மேலாளரிடம
