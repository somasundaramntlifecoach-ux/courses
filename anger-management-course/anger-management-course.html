ிருந்து ஒரு கடுமையான மின்னஞ்சல் வருகிறது. உடனடியாக பதிலளிப்பதற்குப் பதிலாக, பதிலை வரைவு செய்து, 10 நிமிடங்களுக்கு லேப்டாப்பை மூடி, பின் மீண்டும் படித்து அனுப்பும் முன் தொனியை மென்மையாக்குகிறீர்கள்.", "tips_en": ["Save the draft instead of sending immediately — this alone stops most regrettable replies.", "Use the 10 minutes to do something physical (walk, stretch) rather than re-reading the triggering message repeatedly.", "Re-read your draft imagining the recipient's perspective before sending."], "tips_ta": ["உடனடியாக அனுப்புவதற்குப் பதிலாக வரைவைச் சேமிக்கவும் — இது மட்டுமே பெரும்பாலான வருந்தத்தக்க பதில்களை நிறுத்துகிறது.", "தூண்டும் செய்தியை மீண்டும் மீண்டும் படிப்பதற்குப் பதிலாக 10 நிமிடங்களை உடல் ரீதியான ஏதாவது (நடை, நீட்சி) செய்ய பயன்படுத்துங்கள்.", "அனுப்புவதற்கு முன் பெறுநரின் பார்வையை கற்பனை செய்து உங்கள் வரைவை மீண்டும் படியுங்கள்."], "improve_en": "If 10 minutes feels impossible due to urgency, at minimum read your reply once out loud before hitting send — hearing it often reveals a tone you didn't intend.", "improve_ta": "அவசரத்தால் 10 நிமிடங்கள் சாத்தியமற்றதாக உணரப்பட்டால், அனுப்பு பொத்தானை அழுத்துவதற்கு முன் குறைந்தபட்சம் ஒரு முறை உங்கள் பதிலை சத்தமாகப் படியுங்கள் — அதைக் கேட்பது பெரும்பாலும் நீங்கள் நோக்கம் கொள்ளாத ஒரு தொனியை வெளிப்படுத்தும்.", "steps_en": ["Next time you receive a triggering work message, draft your reply but don't send it.", "Wait at least 10 minutes, doing something physical in between.", "Re-read and soften the tone before actually sending."], "steps_ta": ["அடுத்த முறை தூண்டும் வேலை செய்தியைப் பெறும்போது, உங்கள் பதிலை வரைவு செய்யுங்கள் ஆனால் அனுப்ப வேண்டாம்.", "இடையில் உடல் ரீதியான ஏதாவது செய்து குறைந்தது 10 நிமிடங்கள் காத்திருங்கள்.", "உண்மையில் அனுப்புவதற்கு முன் மீண்டும் படித்து தொனியை மென்மையாக்குங்கள்."], "worksheet_en": "Describe the last time you replied to a message too quickly. What would have changed if you'd waited 10 minutes?", "worksheet_ta": "நீங்கள் மிக வேகமாக ஒரு செய்திக்குப் பதிலளித்த கடைசி முறையை விவரியுங்கள். நீங்கள் 10 நிமிடங்கள் காத்திருந்திருந்தால் என்ன மாறியிருக்கும்?"}, {"title_en": "Choosing Your Battles", "title_ta": "உங்கள் போராட்டங்களைத் தேர்ந்தெடுத்தல்", "explanation_en": "Not every unfair moment at work needs an immediate confrontation. Reserving your energy and social capital for the 1-2 issues that truly matter makes you more effective when you do choose to speak up.", "explanation_ta": "வேலையில் ஒவ்வொரு நியாயமற்ற தருணமும் உடனடி மோதலைத் தேவைப்படுத்தாது. உண்மையிலேயே முக்கியமான 1-2 பிரச்சனைகளுக்கு உங்கள் ஆற்றலையும் சமூக மூலதனத்தையும் சேமிப்பது, நீங்கள் பேச தேர்வு செய்யும்போது உங்களை மிகவும் பயனுள்ளதாக ஆக்குகிறது.", "example_en": "A minor scheduling annoyance happens weekly, but a genuine unfair credit-taking incident happens once — someone learns to let the small one slide while addressing the credit issue directly and firmly.", "example_ta": "ஒரு சிறிய அட்டவணை எரிச்சல் வாரந்தோறும் நிகழ்கிறது, ஆனால் ஒரு உண்மையான நியாயமற்ற பெருமை எடுத்தல் சம்பவம் ஒரு முறை நிகழ்கிறது — ஒருவர் சிறியதை விட்டுவிட்டு, பெருமை பிரச்சனையை நேரடியாகவும் உறுதியாகவும் நிவர்த்தி செய்யக் கற்றுக்கொள்கிறார்.", "tips_en": ["Ask: 'Will this matter in a month? In a year?' before deciding to engage.", "Track how often you're speaking up — if it's constant, you may be diluting the impact of the issues that truly matter.", "Letting small things go isn't weakness — it's strategic energy management."], "tips_ta": ["ஈடுபட முடிவெடுப்பதற்கு முன் 'இது ஒரு மாதத்தில் முக்கியமாக இருக்குமா? ஒரு வருடத்தில்?' எனக் கேளுங்கள்.", "நீங்கள் எவ்வளவு அடிக்கடி பேசுகிறீர்கள் எனக் கண்காணியுங்கள் — இது தொடர்ந்து நடந்தால், நீங்கள் உண்மையிலேயே முக்கியமான பிரச்சனைகளின் தாக்கத்தை நீர்த்துப்போகச் செய்யலாம்.", "சிறிய விஷயங்களை விட்டுவிடுவது பலவீனம் அல்ல — இது மூலோபாய ஆற்றல் மேலாண்மை."], "improve_en": "If you struggle to let small things go, try a 'parking lot' list — write the minor irritation down, then decide after 24 hours if it's still worth raising. Most won't be.", "improve_ta": "சிறிய விஷயங்களை விட்டுவிட நீங்கள் சிரமப்பட்டால், 'பார்க்கிங் லாட்' பட்டியலை முயற்சிக்கவும் — சிறிய எரிச்சலை எழுதி, 24 மணி நேரத்திற்குப் பிறகு அதை இன்னும் எழுப்ப வேண்டுமா என முடிவு செய்யுங்கள். பெரும்பாலானவை இல்லை.", "steps_en": ["List 3 recent work irritations, small or large.", "Mark which ones will genuinely matter a month from now.", "For the ones that don't, consciously decide to let them go this week."], "steps_ta": ["3 சமீபத்திய வேலை எரிச்சல்களை, சிறியதோ பெரியதோ, பட்டியலிடுங்கள்.", "ஒரு மாதம் கழித்து உண்மையிலேயே எது முக்கியமாக இருக்கும் எனக் குறிக்கவும்.", "இல்லாதவற்றுக்கு, இந்த வாரம் அவற்றை விட்டுவிட வேண்டுமென்றே முடிவு செய்யுங்கள்."], "worksheet_en": "Which current work irritation is truly worth raising, and which ones are you ready to consciously let go of?", "worksheet_ta": "எந்த தற்போதைய வேலை எரிச்சல் உண்மையிலேயே எழுப்பத் தகுதியானது, எவற்றை நீங்கள் வேண்டுமென்றே விட்டுவிட தயார்?"}]}, {"title_en": "Building Long-Term Emotional Resilience", "title_ta": "நீண்டகால உணர்ச்சி மீள்திறனை உருவாக்குதல்", "intro_en": "Your 'short fuse' is rarely just about the trigger in front of you — sleep debt, chronic stress, and lack of recovery time all lower your anger threshold. This module builds resilience outside of anger moments.", "intro_ta": "உங்கள் 'குறுகிய பொறுமை' அரிதாகவே உங்கள் முன் உள்ள தூண்டுதலைப் பற்றியது — தூக்கக் குறைபாடு, நாள்பட்ட மன அழுத்தம், மீட்பு நேரமின்மை அனைத்தும் உங்கள் கோப வாசலைக் குறைக்கின்றன. இந்த பாட நிலை கோப தருணங்களுக்கு வெளியே மீள்திறனைக் கட்டமைக்கிறது.", "subtopics": [{"title_en": "Sleep & Anger Threshold", "title_ta": "தூக்கமும் கோப வாசலும்", "explanation_en": "Sleep deprivation directly impairs the brain's ability to regulate emotional reactions. Even one night of poor sleep can measurably lower the trigger threshold for anger the next day.", "explanation_ta": "தூக்கக் குறைவு உணர்ச்சி எதிர்வினைகளை ஒழுங்குபடுத்தும் மூளையின் திறனை நேரடியாகப் பாதிக்கிறது. ஒரே ஒரு இரவு மோசமான தூக்கம் கூட அடுத்த நாள் கோபத்திற்கான தூண்டுதல் வாசலை அளவிடக்கூடிய அளவு குறைக்கும்.", "example_en": "On days you slept less than 5 hours, notice how much smaller the trigger needs to be to set you off — that's data, not a character flaw.", "example_ta": "நீங்கள் 5 மணி நேரத்திற்கும் குறைவாக தூங்கிய நாட்களில், உங்களை கோபப்படுத்த எவ்வளவு சிறிய தூண்டுதல் போதுமானது எனக் கவனியுங்கள் — இது தரவு, குணக்குறை அல்ல.", "tips_en": ["Track your sleep hours alongside your anger log to see the direct connection.", "On known short-sleep days, plan for extra buffer time and fewer high-stakes conversations.", "Consistency in sleep timing often matters as much as total hours."], "tips_ta": ["நேரடி தொடர்பைப் பார்க்க உங்கள் தூக்க மணிநேரத்தை உங்கள் கோப பதிவுடன் கண்காணியுங்கள்.", "தெரிந்த குறுகிய தூக்க நாட்களில், கூடுதல் இடைவெளி நேரத்தையும் குறைவான உயர் இடர் உரையாடல்களையும் திட்டமிடுங்கள்.", "தூக்க நேரத்தில் நிலைத்தன்மை பெரும்பாலும் மொத்த மணிநேரங்களைப் போலவே முக்கியம்."], "improve_en": "If poor sleep is chronic rather than occasional, that's worth addressing as its own priority — even small changes like a consistent wind-down routine can meaningfully raise your anger threshold over time.", "improve_ta": "மோசமான தூக்கம் அவ்வப்போது அல்லாமல் நாள்பட்டதாக இருந்தால், அதை அதன் சொந்த முன்னுரிமையாக நிவர்த்தி செய்வது மதிப்புக்குரியது — நிலையான தளர்வு வழக்கம் போன்ற சிறிய மாற்றங்கள் கூட காலப்போக்கில் உங்கள் கோப வாசலை கணிசமாக உயர்த்தும்.", "steps_en": ["Track your sleep hours and anger intensity together for one week.", "Identify your worst sleep night and note how anger showed up the next day.", "Try one small sleep improvement (earlier wind-down, no screens before bed) this week."], "steps_ta": ["ஒரு வாரத்திற்கு உங்கள் தூக்க மணிநேரத்தையும் கோப தீவிரத்தையும் ஒன்றாகக் கண்காணியுங்கள்.", "உங்கள் மோசமான தூக்க இரவை அடையாளம் கண்டு அடுத்த நாள் கோபம் எப்படி வெளிப்பட்டது எனக் குறிப்பிடுங்கள்.", "இந்த வாரம் ஒரு சிறிய தூக்க மேம்பாட்டை (முன்கூட்டிய தளர்வு, படுக்கைக்கு முன் திரைகள் இல்லை) முயற்சிக்கவும்."], "worksheet_en": "What connection did you notice this week between your sleep and your anger intensity?", "worksheet_ta": "இந்த வாரம் உங்கள் தூக்கத்திற்கும் கோப தீவிரத்திற்கும் இடையே என்ன தொடர்பைக் கவனித்தீர்கள்?"}, {"title_en": "Daily Recovery Practices", "title_ta": "தினசரி மீட்பு நடைமுறைகள்", "explanation_en": "Short, consistent recovery breaks — even 15 minutes of screen-free downtime — widen the gap between trigger and explosion by keeping your baseline stress lower throughout the day.", "explanation_ta": "குறுகிய, நிலையான மீட்பு இடைவேளைகள் — 15 நிமிட திரை இல்லாத ஓய்வு நேரம் கூட — நாள் முழுவதும் உங்கள் அடிப்படை மன அழுத்தத்தைக் குறைவாக வைத்திருப்பதன் மூலம் தூண்டுதலுக்கும் வெடிப்புக்கும் இடையிலான இடைவெளியை விரிவுபடுத்துகிறது.", "example_en": "Someone who adds a 15-minute walk without their phone between work and picking up their kids notices they have noticeably more patience during the evening routine, compared to days they skip it.", "example_ta": "வேலைக்கும் தங்கள் குழந்தைகளை அழைத்து வருவதற்கும் இடையில் ஃபோன் இல்லாமல் 15-நிமிட நடையைச் சேர்க்கும் ஒருவர், அதைத் தவிர்க்கும் நாட்களுடன் ஒப்பிடும்போது மாலை வழக்கத்தில் குறிப்பிடத்தக்க அளவு அதிக பொறுமை இருப்பதைக் கவனிக்கிறார்.", "tips_en": ["Schedule recovery time like an appointment — it's easy to skip if it's not planned.", "Screen-free is important — scrolling often isn't actually restful for your nervous system.", "Even 5-10 minutes consistently is better than an occasional long break."], "tips_ta": ["மீட்பு நேரத்தை ஒரு சந்திப்பு போல் திட்டமிடுங்கள் — திட்டமிடப்படாவிட்டால் தவிர்ப்பது எளிது.", "திரை இல்லாதது முக்கியம் — உருட்டுவது பெரும்பாலும் உங்கள் நரம்பு மண்டலத்திற்கு உண்மையில் ஓய்வளிக்காது.", "அவ்வப்போது நீண்ட இடைவேளையை விட நிலையாக 5-10 நிமிடங்கள் கூட சிறந்தது."], "improve_en": "If a full 15 minutes feels impossible to find, start with just 5 minutes of intentional quiet — even that small amount compounds over a week.", "improve_ta": "முழு 15 நிமிடங்களைக் கண்டுபிடிப்பது சாத்தியமற்றதாக உணரப்பட்டால், வேண்டுமென்றே அமைதியான 5 நிமிடங்களுடன் தொடங்குங்கள் — அந்த சிறிய அளவு கூட ஒரு வாரத்தில் சேர்ந்து பெருகும்.", "steps_en": ["Add one 15-minute screen-free recovery break into your daily schedule.", "Choose an activity for it: walk, music, silence, stretching.", "Do it for 5 consecutive days and note any change in patience or mood."], "steps_ta": ["உங்கள் தினசரி அட்டவணையில் ஒரு 15-நிமிட திரை இல்லாத மீட்பு இடைவேளையைச் சேருங்கள்.", "அதற்கு ஒரு செயலைத் தேர்வு செய்யுங்கள்: நடை, இசை, மௌனம், நீட்சி.", "தொடர்ந்து 5 நாட்கள் அதைச் செய்து பொறுமை அல்லது மனநிலையில் ஏதேனும் மாற்றத்தைக் குறிப்பிடுங்கள்."], "worksheet_en": "What recovery break will you add to your day, and at what time will you protect it?", "worksheet_ta": "உங்கள் நாளில் என்ன மீட்பு இடைவேளையைச் சேர்ப்பீர்கள், அதை எந்த நேரத்தில் பாதுகாப்பீர்கள்?"}, {"title_en": "Reducing Chronic Stressors", "title_ta": "நாள்பட்ட மன அழுத்தங்களைக் குறைத்தல்", "explanation_en": "Beyond daily recovery, look for the one or two chronic stressors (a long commute, unresolved financial worry, an overloaded schedule) quietly keeping your baseline anger threshold low all the time.", "explanation_ta": "தினசரி மீட்புக்கு அப்பால், உங்கள் அடிப்படை கோப வாசலை எப்போதும் அமைதியாகக் குறைவாக வைத்திருக்கும் ஒன்று அல்லது இரண்டு நாள்பட்ட மன அழுத்தங்களை (நீண்ட பயணம், தீர்க்கப்படாத நிதி கவலை, அதிக சுமையான அட்டவணை) தேடுங்கள்.", "example_en": "Someone realizes their short temper at home isn't really about their family — it's an unaddressed financial stress they've been avoiding for months, quietly raising their irritability across every part of life.", "example_ta": "வீட்டில் தங்கள் குறுகிய பொறுமை உண்மையில் தங்கள் குடும்பத்தைப் பற்றியது அல்ல என்று ஒருவர் உணர்கிறார் — இது மாதங்களாக அவர்கள் தவிர்த்து வந்த ஒரு நிவர்த்தி செய்யப்படாத நிதி அழுத்தம், இது வாழ்க்கையின் ஒவ்வொரு பகுதியிலும் அமைதியாக அவர்களின் எரிச்சலை அதிகரிக்கிறது.", "tips_en": ["Ask: 'What's been quietly weighing on me for weeks or months, unrelated to today's trigger?'", "Chronic stressors often need a different kind of action plan than in-the-moment anger — often one concrete step, not a mindset shift.", "You don't have to solve the whole stressor at once — one small step this month is enough to start."], "tips_ta": ["'இன்றைய தூண்டுதலுடன் தொடர்பில்லாமல், வாரங்களாகவோ மாதங்களாகவோ அமைதியாக என்னை நசுக்குவது என்ன?' எனக் கேளுங்கள்.", "நாள்பட்ட மன அழுத்தங்களுக்கு பெரும்பாலும் தருண கோபத்தை விட வேறுவிதமான செயல் திட்டம் தேவை — பெரும்பாலும் மனநிலை மாற்றம் அல்ல, ஒரு உறுதியான படி.", "நீங்கள் ஒரே நேரத்தில் முழு அழுத்தத்தையும் தீர்க்க வேண்டியதில்லை — இந்த மாதம் ஒரு சிறிய படி தொடங்க போதுமானது."], "improve_en": "If naming the chronic stressor feels overwhelming, break it into the smallest possible first action — like making one phone call or writing down the actual numbers — rather than trying to solve it all at once.", "improve_ta": "நாள்பட்ட மன அழுத்தத்தைப் பெயரிடுவது அதிகமாக உணரப்பட்டால், ஒரே நேரத்தில் அனைத்தையும் தீர்க்க முயற்சிப்பதற்குப் பதிலாக, ஒரு தொலைபேசி அழைப்பு செய்வது அல்லது உண்மையான எண்களை எழுதுவது போன்ற மிகச்சிறிய முதல் செயலாக அதைப் பிரிக்கவும்.", "steps_en": ["Identify your biggest chronic stressor right now.", "Break it into one small, concrete first step.", "Take that one step this month, and note how it affects your day-to-day irritability."], "steps_ta": ["இப்போது உங்கள் மிகப்பெரிய நாள்பட்ட மன அழுத்தத்தை அடையாளம் காணுங்கள்.", "அதை ஒரு சிறிய, உறுதியான முதல் படியாகப் பிரிக்கவும்.", "இந்த மாதம் அந்த ஒரு படியை எடுத்து, அது உங்கள் அன்றாட எரிச்சலை எப்படி பாதிக்கிறது எனக் குறிப்பிடுங்கள்."], "worksheet_en": "What's the one chronic stressor quietly shortening your fuse, and what's the smallest first step you can take on it this month?", "worksheet_ta": "உங்கள் பொறுமையை அமைதியாகக் குறைக்கும் ஒரு நாள்பட்ட மன அழுத்தம் என்ன, இந்த மாதம் அதில் நீங்கள் எடுக்கக்கூடிய மிகச்சிறிய முதல் படி என்ன?"}]}, {"title_en": "Your Personal Action Plan & Relapse Prevention", "title_ta": "உங்கள் தனிப்பட்ட செயல் திட்டம் மற்றும் மீள்வராமை தடுப்பு", "intro_en": "Mastery isn't never getting angry again — it's having a plan for when you do. This final module brings everything together into one personal, written toolkit.", "intro_ta": "தேர்ச்சி என்பது இனி ஒருபோதும் கோபப்படாதது அல்ல — நீங்கள் கோபப்படும்போது ஒரு திட்டம் இருப்பதுதான். இந்த இறுதி பாட நிலை அனைத்தையும் ஒரு தனிப்பட்ட, எழுதப்பட்ட கருவித்தொகுப்பாக ஒன்றிணைக்கிறது.", "subtopics": [{"title_en": "Your Top Triggers Map", "title_ta": "உங்கள் முதன்மை தூண்டுதல்கள் வரைபடம்", "explanation_en": "Looking back across all 10 modules, most people find their anger really centers on just 2-3 recurring triggers. Naming them clearly, in your own words, is the foundation the rest of your action plan builds on.", "explanation_ta": "எல்லா 10 பாட நிலைகளையும் திரும்பிப் பார்க்கும்போது, பெரும்பாலான மக்கள் தங்கள் கோபம் உண்மையில் வெறும் 2-3 மீண்டும் வரும் தூண்டுதல்களை மையமாகக் கொண்டிருப்பதைக் காண்கிறார்கள். அவற்றை உங்கள் சொந்த வார்த்தைகளில் தெளிவாகப் பெயரிடுவது உங்கள் செயல் திட்டத்தின் மீதி கட்டமைக்கப்படும் அடித்தளம்.", "example_en": "After reviewing their anger log from Module 2, someone realizes their top 3 triggers are: being interrupted, feeling unappreciated at work, and last-minute plan changes — far fewer than the dozens of individual incidents they'd logged.", "example_ta": "பாட நிலை 2லிருந்து தங்கள் கோப பதிவை மதிப்பாய்வு செய்த பிறகு, ஒருவர் தங்கள் முதன்மை 3 தூண்டுதல்கள்: குறுக்கிடப்படுதல், வேலையில் பாராட்டப்படாமை, கடைசி நிமிட திட்ட மாற்றங்கள் என்பதை உணர்கிறார் — அவர்கள் பதிவு செய்த டஜன் கணக்கான தனிப்பட்ட சம்பவங்களை விட மிகக் குறைவு.", "tips_en": ["Review your anger log from Module 2 if you kept one — the patterns are usually already there.", "Write your triggers in specific terms ('being interrupted while speaking') rather than vague ones ('disrespect').", "Three triggers is plenty — you don't need an exhaustive list to make real progress."], "tips_ta": ["நீங்கள் ஒன்றை வைத்திருந்தால் பாட நிலை 2லிருந்து உங்கள் கோப பதிவை மதிப்பாய்வு செய்யுங்கள் — முறைகள் பொதுவாக ஏற்கனவே அங்கே உள்ளன.", "தெளிவற்றவற்றை ('அவமரியாதை') விட குறிப்பிட்ட சொற்களில் ('பேசும்போது குறுக்கிடப்படுதல்') உங்கள் தூண்டுதல்களை எழுதுங்கள்.", "மூன்று தூண்டுதல்கள் போதுமானது — உண்மையான முன்னேற்றத்திற்கு விரிவான பட்டியல் தேவையில்லை."], "improve_en": "If you're struggling to narrow it down to 2-3, look for the underlying need behind several triggers — often several 'different' triggers actually share the same root need (e.g. respect, being heard, fairness).", "improve_ta": "நீங்கள் 2-3ஆகக் குறைக்க சிரமப்பட்டால், பல தூண்டுதல்களுக்குப் பின்னால் உள்ள அடிப்படை தேவையைத் தேடுங்கள் — பெரும்பாலும் பல 'வெவ்வேறு' தூண்டுதல்கள் உண்மையில் ஒரே அடிப்படை தேவையை (எ.கா. மரியாதை, கேட்கப்படுதல், நியாயம்) பகிர்ந்து கொள்கின்றன.", "steps_en": ["Write your top 3 personal anger triggers in specific, concrete terms.", "For each, note the underlying need it points to.", "Keep this list somewhere you'll see it regularly."], "steps_ta": ["உங்கள் தனிப்பட்ட முதல் 3 கோப தூண்டுதல்களை குறிப்பிட்ட, உறுதியான சொற்களில் எழுதுங்கள்.", "ஒவ்வொன்றிற்கும், அது சுட்டிக்காட்டும் அடிப்படை தேவையைக் குறிப்பிடுங்கள்.", "இந்த பட்டியலை நீங்கள் அடிக்கடி பார்க்கும் இடத்தில் வைத்திருங்கள்."], "worksheet_en": "What are your top 3 personal anger triggers, and what underlying need connects them?", "worksheet_ta": "உங்கள் தனிப்பட்ட முதல் 3 கோப தூண்டுதல்கள் என்ன, அவற்றை இணைக்கும் அடிப்படை தேவை என்ன?"}, {"title_en": "Your Personal Toolkit", "title_ta": "உங்கள் தனிப்பட்ட கருவித்தொகுப்பு", "explanation_en": "For each top trigger, pair it with one specific tool from this course — a cooling technique, a balanced thought, or an assertive phrase — so you have a ready response instead of improvising in the heat of the moment.", "explanation_ta": "ஒவ்வொரு முதன்மை தூண்டுதலுக்கும், இந்த பாடத்திட்டத்திலிருந்து ஒரு குறிப்பிட்ட கருவியுடன் — ஒரு அமைதி நுட்பம், சமநிலையான எண்ணம், அல்லது உறுதியான வாக்கியம் — இணைக்கவும், அதனால் தருணத்தின் வெப்பத்தில் திட்டமிடாமல் ஒரு தயார் பதில் உங்களிடம் இருக்கும்.", "example_en": "A learner's toolkit: Trigger = being interrupted → Tool = 4-6 breathing (Module 4) + the phrase 'I feel unheard when interrupted, please let me finish' (Module 6).", "example_ta": "ஒரு கற்பவரின் கருவித்தொகுப்பு: தூண்டுதல் = குறுக்கிடப்படுதல் → கருவி = 4-6 சுவாசம் (பாட நிலை 4) + 'குறுக்கிடப்படும்போது கேட்கப்படாதவனாக உணர்கிறேன், முடிக்க அனுமதிக்கவும்' என்ற வாக்கியம் (பாட நிலை 6).", "tips_en": ["Choose tools you actually practiced during the course, not just ones that sound good in theory.", "Keep the toolkit visible — a phone note or printed card works well.", "It's fine to adjust your toolkit after trying it in real situations — treat it as a living document."], "tips_ta": ["தத்துவத்தில் நன்றாக ஒலிக்கும் கருவிகளை அல்ல, பாடத்திட்டத்தின்போது நீங்கள் உண்மையில் பயிற்சி செய்த கருவிகளைத் தேர்வு செய்யுங்கள்.", "கருவித்தொகுப்பை தெரியும்படி வைத்திருங்கள் — ஒரு ஃபோன் குறிப்பு அல்லது அச்சிடப்பட்ட அட்டை நன்றாக வேலை செய்யும்.", "உண்மையான சூழல்களில் முயற்சித்த பிறகு உங்கள் கருவித்தொகுப்பை சரிசெய்வது சரி — இதை ஒரு உயிருள்ள ஆவணமாகக் கருதுங்கள்."], "improve_en": "If you're unsure which tool fits which trigger, revisit the module where that trigger's pattern was discussed and pick the technique that felt most natural when you first tried it.", "improve_ta": "எந்த கருவி எந்த தூண்டுதலுக்குப் பொருந்தும் என உறுதியாக இல்லையென்றால், அந்த தூண்டுதலின் முறை விவாதிக்கப்பட்ட பாட நிலைக்குத் திரும்பிச் சென்று, நீங்கள் முதலில் முயற்சித்தபோது மிக இயல்பாக உணரப்பட்ட நுட்பத்தைத் தேர்வு செய்யுங்கள்.", "steps_en": ["For each of your top 3 triggers, choose one cooling technique and one assertive phrase.", "Write the full toolkit out in one place (notebook, phone note).", "Test one item from your toolkit for real this week."], "steps_ta": ["உங்கள் முதல் 3 தூண்டுதல்களில் ஒவ்வொன்றிற்கும், ஒரு அமைதி நுட்பத்தையும் ஒரு உறுதியான வாக்கியத்தையும் தேர்வு செய்யுங்கள்.", "முழு கருவித்தொகுப்பையும் ஒரே இடத்தில் (குறிப்பேடு, ஃபோன் குறிப்பு) எழுதுங்கள்.", "இந்த வாரம் உங்கள் கருவித்தொகுப்பிலிருந்து ஒரு பொருளை உண்மையாக சோதிக்கவும்."], "worksheet_en": "Write out your complete personal toolkit — trigger, tool, and phrase for each of your top 3.", "worksheet_ta": "உங்கள் முழுமையான தனிப்பட்ட கருவித்தொகுப்பை எழுதுங்கள் — உங்கள் முதல் 3க்கும் தூண்டுதல், கருவி, வாக்கியம்."}, {"title_en": "Relapse Recovery Plan", "title_ta": "மீள்வராமை மீட்பு திட்டம்", "explanation_en": "You will slip sometimes — that's normal, not failure. A relapse recovery plan decides in advance what you'll do afterward: repair quickly, reflect without self-punishment, and get back to practicing.", "explanation_ta": "நீங்கள் சில நேரங்களில் தவறுவீர்கள் — அது இயல்பானது, தோல்வி அல்ல. மீள்வராமை மீட்பு திட்டம் நீங்கள் பின்னர் என்ன செய்வீர்கள் என்பதை முன்கூட்டியே முடிவு செய்கிறது: விரைவாக சரிசெய்யுங்கள், சுய தண்டனையின்றி சிந்தியுங்கள், பயிற்சிக்குத் திரும்புங்கள்.", "example_en": "After snapping at a family member despite all their practice, someone follows their relapse plan: apologize within 24 hours, note what triggered it in their log, and resume their daily breathing practice the next morning — no spiral of shame.", "example_ta": "எல்லா பயிற்சிக்கும் பிறகும் ஒரு குடும்ப உறுப்பினரிடம் கோபப்பட்ட பிறகு, ஒருவர் தங்கள் மீள்வராமை திட்டத்தைப் பின்பற்றுகிறார்: 24 மணி நேரத்திற்குள் மன்னிப்புக் கேளுங்கள், அது எதனால் தூண்டப்பட்டது என்பதை தங்கள் பதிவில் குறிப்பிடுங்கள், அடுத்த நாள் காலையில் தினசரி சுவாச பயிற்சியை மீண்டும் தொடங்குங்கள் — வெட்கத்தின் சுழற்சி இல்லை.", "tips_en": ["Decide your repair timeline in advance (e.g. 'within 24 hours') so you don't let shame delay it.", "Treat each slip as data for your log, not evidence you've failed at this.", "Resuming practice immediately matters more than any single slip."], "tips_ta": ["வெட்கம் அதைத் தாமதப்படுத்த அனுமதிக்காதவாறு உங்கள் சரிசெய்யும் காலஅட்டவணையை (எ.கா. '24 மணி நேரத்திற்குள்') முன்கூட்டியே முடிவு செய்யுங்கள்.", "ஒவ்வொரு தவறையும் நீங்கள் இதில் தோற்றுவிட்டீர்கள் என்பதற்கான ஆதாரமாக அல்ல, உங்கள் பதிவுக்கான தரவாகக் கருதுங்கள்.", "எந்த ஒரு தவறையும் விட உடனடியாக பயிற்சியை மீண்டும் தொடங்குவது முக்கியம்."], "improve_en": "If shame tends to keep you from repairing quickly after a slip, remind yourself that a fast, imperfect repair is far more valuable to the relationship than a delayed, perfect one.", "improve_ta": "வெட்கம் ஒரு தவறுக்குப் பிறகு விரைவாக சரிசெய்வதிலிருந்து உங்களைத் தடுக்கும் போக்கு இருந்தால், விரைவான, குறைபாடுள்ள சரிசெய்தல் தாமதமான, சரியான ஒன்றை விட உறவுக்கு மிகவும் மதிப்புமிக்கது என்பதை நினைவூட்டுங்கள்.", "steps_en": ["Write your relapse recovery plan: 'If I slip, I will ___ within 24 hours, without self-punishment.'", "Decide how you'll log a slip so it becomes useful data, not just guilt.", "Commit to resuming your practice the very next day after any slip."], "steps_ta": ["உங்கள் மீள்வராமை மீட்பு திட்டத்தை எழுதுங்கள்: 'நான் தவறினால், 24 மணி நேரத்திற்குள் ___ செய்வேன், சுய தண்டனை இல்லாமல்.'", "ஒரு தவறு வெறும் குற்ற உணர்வாக அல்லாமல் பயனுள்ள தரவாக மாற எப்படி அதை பதிவு செய்வீர்கள் என்பதை முடிவு செய்யுங்கள்.", "எந்த ஒரு தவறுக்குப் பிறகும் அடுத்த நாளே உங்கள் பயிற்சியை மீண்டும் தொடங்க உறுதியளியுங்கள்."], "worksheet_en": "Looking back at all 10 modules, what is the single biggest shift in how you plan to handle anger going forward?", "worksheet_ta": "அனைத்து 10 பாட நிலைகளையும் திரும்பிப் பார்க்கும்போது, இனிமேல் கோபத்தைக் கையாள்வதில் நீங்கள் திட்டமிடும் மிகப்பெரிய மாற்றம் என்ன?"}]}];

/* =========================================================
   STATE
========================================================= */
let currentModule = 0;
let openSubtopic = 0;
let completed = JSON.parse(localStorage.getItem('amm_completed') || "[]");
let subtopicsDone = JSON.parse(localStorage.getItem('amm_subtopics_done') || "{}");
let reflections = JSON.parse(localStorage.getItem('amm_reflections') || "{}");
let worksheets = JSON.parse(localStorage.getItem('amm_worksheets') || "{}");

/* =========================================================
   GATE / REGISTRATION
========================================================= */
function toggleLang(){
  document.body.classList.toggle('ta');
  const isTa = document.body.classList.contains('ta');
  localStorage.setItem('amm_lang', isTa ? 'ta':'en');
  if(document.getElementById('app').classList.contains('show')){ renderSidebar(); renderModule(currentModule); }
}
(function(){ if(localStorage.getItem('amm_lang')==='ta'){ document.body.classList.add('ta'); } })();

const COURSE_ID = "anger-management";

function unlockApp(){
  document.getElementById('gateOverlay').style.display = 'none';
  document.getElementById('app').classList.add('show');
  renderSidebar();
  renderModule(currentModule);
}

function logout(){
  auth.signOut().then(function(){ window.location.reload(); });
}

auth.onAuthStateChanged(async function(user){
  if(!user){
    window.location.href = 'login.html';
    return;
  }
  try{
    const doc = await db.collection('students').doc(user.uid).get();
    const data = doc.exists ? doc.data() : null;
    const courses = (data && data.courses) || [];
    if(!courses.includes(COURSE_ID)){
      window.location.href = 'not-enrolled.html';
      return;
    }
    unlockApp();
  }catch(err){
    console.error('Access check failed:', err);
    window.location.href = 'login.html';
  }
});

/* =========================================================
   SHEETS LOGGING (image-pixel GET, CORS-safe)
========================================================= */
function logToSheet(data){
  try{
    const params = new URLSearchParams(data).toString();
    const img = new Image();
    img.src = SHEET_ENDPOINT + "?" + params;
  }catch(err){ /* fail silently */ }
}

/* =========================================================
   RENDER SIDEBAR
========================================================= */
function renderSidebar(){
  const isTa = document.body.classList.contains('ta');
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = modules.map((m,i)=>{
    const done = completed.includes(i);
    const title = isTa ? m.title_ta : m.title_en;
    return `<div class="nav-item ${i===currentModule?'active':''} ${done?'done':''}" onclick="renderModule(${i})">
      <div class="nav-num">${i+1}</div><div>${title}</div>
    </div>`;
  }).join('');
  document.getElementById('progressPill').innerHTML =
    `${completed.length}/10 <span data-en>complete</span><span data-ta>நிறைவு</span>`;
  if(isTa){
    document.querySelectorAll('#progressPill [data-en]').forEach(el=>el.style.display='none');
    document.querySelectorAll('#progressPill [data-ta]').forEach(el=>el.style.display='inline');
  }
}

/* =========================================================
   RENDER MODULE
========================================================= */
function renderModule(i){
  currentModule = i;
  openSubtopic = 0;
  const isTa = document.body.classList.contains('ta');
  const m = modules[i];
  const done = completed.includes(i);
  const savedReflection = reflections[i] || "";

  const subtopicsHtml = m.subtopics.map((s, si) => renderSubtopic(m, i, s, si, isTa)).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="module-tag">${isTa?'பாட நிலை':'Module'} ${i+1} / 10</div>
    <div class="module-title">${isTa?m.title_ta:m.title_en}</div>
    <div class="module-intro"><p>${isTa?m.intro_ta:m.intro_en}</p></div>

    ${subtopicsHtml}

    <div class="module-reflection">
      <label>${isTa?'பாட நிலை சிந்தனை':'Module Reflection'}</label>
      <p style="font-size:.88rem;margin-bottom:8px;">${isTa?m.subtopics[m.subtopics.length-1].worksheet_ta:m.subtopics[m.subtopics.length-1].worksheet_en}</p>
      <textarea id="reflectionText" placeholder="${isTa?'உங்கள் பதிலை இங்கே எழுதுங்கள்...':'Write your reflection here...'}">${savedReflection}</textarea>
    </div>

    <div class="nav-btns">
      <button class="btn btn-outline" onclick="goPrev()" ${i===0?'disabled style="opacity:.4"':''}>${isTa?'← முந்தையது':'← Previous'}</button>
      <button class="btn ${done?'btn-outline':'btn-complete'}" onclick="markComplete(${i})">${done?(isTa?'✓ முடிந்தது':'✓ Completed'):(isTa?'இந்த பாட நிலையை முடிக்கவும்':'Mark Module Complete')}</button>
      ${i===modules.length-1 ? '' : `<button class="btn btn-primary" onclick="goNext()">${isTa?'அடுத்தது →':'Next →'}</button>`}
    </div>

    ${i===modules.length-1 ? renderCompletionBox(isTa) : ''}
  `;
  renderSidebar();
}

function renderSubtopic(m, mi, s, si, isTa){
  const key = mi + '_' + si;
  const isOpen = si === 0;
  const wsValue = worksheets[key] || "";
  const subDone = !!subtopicsDone[key];
  return `
  <div class="subtopic ${isOpen?'open':''}" id="subtopic_${si}">
    <div class="subtopic-header" onclick="toggleSubtopic(${si})">
      <div class="sub-title-wrap"><span class="sub-num">${mi+1}.${si+1}</span><h3>${isTa?s.title_ta:s.title_en}</h3></div>
      <span class="chevron">▾</span>
    </div>
    <div class="subtopic-body">
      <div class="content-block"><p>${isTa?s.explanation_ta:s.explanation_en}</p></div>

      <div class="callout example">
        <div class="callout-label">${isTa?'உதாரணம்':'Real-Life Example'}</div>
        <p>${isTa?s.example_ta:s.example_en}</p>
      </div>

      <div class="callout tips">
        <div class="callout-label">${isTa?'வழிகாட்டுதல் & குறிப்புகள்':'Guidance & Tips'}</div>
        <ul>${(isTa?s.tips_ta:s.tips_en).map(t=>`<li>${t}</li>`).join('')}</ul>
      </div>

      <div class="callout improve">
        <div class="callout-label">${isTa?'மேம்பாட்டு பரிந்துரை':'Suggestion for Improvement'}</div>
        <p>${isTa?s.improve_ta:s.improve_en}</p>
      </div>

      <div class="action-plan">
        <h4>${isTa?'செயல் திட்டம்':'Action Plan'}</h4>
        <ol>${(isTa?s.steps_ta:s.steps_en).map(st=>`<li>${st}</li>`).join('')}</ol>
      </div>

      <div class="worksheet">
        <div class="worksheet-label">${isTa?'பணித்தாள்':'Worksheet'}</div>
        <p class="prompt">${isTa?s.worksheet_ta:s.worksheet_en}</p>
        <textarea id="worksheet_${si}" onblur="saveWorksheet(${si})" placeholder="${isTa?'உங்கள் பதிலை இங்கே எழுதுங்கள்...':'Write your answer here...'}">${wsValue}</textarea>
        <div class="save-note">${isTa?'தானாக சேமிக்கப்படும்':'Auto-saved as you go'}</div>
      </div>

      <button class="subtopic-complete-btn ${subDone?'done':''}" onclick="toggleSubtopicDone(${si}, event)">
        ${subDone?(isTa?'✓ முடிந்தது':'✓ Done'):(isTa?'இதை முடிந்ததாக குறிக்கவும்':'Mark as Done')}
      </button>
    </div>
  </div>`;
}

function toggleSubtopic(si){
  document.querySelectorAll('.subtopic').forEach((el, idx)=>{
    if(idx === si){ el.classList.toggle('open'); }
  });
}

function toggleSubtopicDone(si, event){
  event.stopPropagation();
  const key = currentModule + '_' + si;
  subtopicsDone[key] = !subtopicsDone[key];
  localStorage.setItem('amm_subtopics_done', JSON.stringify(subtopicsDone));
  renderModule(currentModule);
  setTimeout(()=>{ document.querySelectorAll('.subtopic')[si].classList.add('open'); }, 0);
}

function saveWorksheet(si){
  const ta = document.getElementById('worksheet_' + si);
  if(ta){
    const key = currentModule + '_' + si;
    worksheets[key] = ta.value;
    localStorage.setItem('amm_worksheets', JSON.stringify(worksheets));
  }
}

function renderCompletionBox(isTa){
  const allDone = completed.length >= modules.length;
  if(!allDone) return '';
  return `<div class="cert-box">
    <h3>${isTa?'🎉 வாழ்த்துக்கள்! நீங்கள் அனைத்தையும் முடித்துவிட்டீர்கள்':'🎉 Congratulations — You Completed the Course!'}</h3>
    <p>${isTa?'கோப மேலாண்மையில் நீங்கள் ஒரு பெரிய படியை எடுத்துவிட்டீர்கள். கற்றதைத் தொடர்ந்து பயிற்சி செய்யுங்கள்.':"You've taken a real step toward mastering your anger. Keep practicing what you've learned."}</p>
    <a class="btn" href="https://wa.me/${WHATSAPP_NUMBER}?text=Hi%2C%20I%27ve%20completed%20the%20Anger%20Management%20Mastery%20course" target="_blank">
      ${isTa?'உங்கள் அனுபவத்தைப் பகிரவும்':'Share Your Experience'}
    </a>
  </div>`;
}

function markComplete(i){
  const textarea = document.getElementById('reflectionText');
  if(textarea){ reflections[i] = textarea.value; localStorage.setItem('amm_reflections', JSON.stringify(reflections)); }
  if(!completed.includes(i)){
    completed.push(i);
    localStorage.setItem('amm_completed', JSON.stringify(completed));
    const user = JSON.parse(localStorage.getItem('amm_user')||'{}');
    logToSheet({type:'module_complete', module:i+1, name:user.name||'', mobile:user.mobile||''});
    if(completed.length===modules.length){
      logToSheet({type:'course_complete', name:user.name||'', mobile:user.mobile||''});
    }
  }
  renderModule(currentModule);
}

function goNext(){ saveCurrentReflection(); if(currentModule < modules.length-1){ renderModule(currentModule+1); } }
function goPrev(){ saveCurrentReflection(); if(currentModule > 0){ renderModule(currentModule-1); } }
function saveCurrentReflection(){
  const textarea = document.getElementById('reflectionText');
  if(textarea){ reflections[currentModule] = textarea.value; localStorage.setItem('amm_reflections', JSON.stringify(reflections)); }
}
</script>
</body>
</html>
