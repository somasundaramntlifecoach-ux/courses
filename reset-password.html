<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Your Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#0f2044; --gold:#c8a250; --bg:#f6f4ef; --green:#1ea952; --red:#b3261e; }
  *{box-sizing:border-box;}
  body{ margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); font-family:'Poppins',sans-serif; padding:20px; }
  .card{ background:#fff; max-width:420px; width:100%; border-radius:16px; padding:36px 30px; box-shadow:0 10px 40px rgba(15,32,68,0.12); text-align:center; }
  h1{ color:var(--navy); font-size:20px; margin:0 0 8px; }
  p.sub{ color:#666; font-size:14px; margin-bottom:22px; line-height:1.5; }
  input{ width:100%; padding:12px 14px; margin-bottom:14px; border-radius:8px; border:1px solid #ddd; font-size:15px; font-family:inherit; }
  button{ width:100%; padding:13px; background:var(--navy); color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; }
  button:hover{ background:#183465; }
  .msg{ font-size:13.5px; margin-top:14px; padding:10px 12px; border-radius:8px; display:none; }
  .msg.ok{ background:#e6f6ec; color:var(--green); display:block; }
  .msg.err{ background:#fbeaea; color:var(--red); display:block; }
  .footer{ margin-top:20px; font-size:12px; color:#999; }
</style>
</head>
<body>

<div class="card">
  <div id="formState">
    <h1>Set a New Password</h1>
    <p class="sub" id="emailLine">Checking your reset link...</p>
    <input type="password" id="newPassword" placeholder="New password (min 6 characters)" style="display:none;">
    <button onclick="submitNewPassword()" id="submitBtn" style="display:none;">Set New Password</button>
  </div>
  <div id="successState" style="display:none;">
    <h1>Password Updated ✓</h1>
    <p class="sub">You can now log in with your new password.</p>
    <button onclick="window.location.href='login.html'">Go to Login</button>
  </div>
  <div class="msg" id="msg"></div>
  <div class="footer">God is always with u</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

const mode = getParam('mode');
const oobCode = getParam('oobCode');

function showMsg(text, ok){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'ok' : 'err');
}

if(mode !== 'resetPassword' || !oobCode){
  document.getElementById('emailLine').textContent = 'This link is invalid or incomplete.';
} else {
  // This ONLY verifies the code is currently valid — it does NOT consume it.
  // The code is only used up later, when the person submits their new password.
  auth.verifyPasswordResetCode(oobCode)
    .then(function(email){
      document.getElementById('emailLine').textContent = 'Setting a new password for ' + email;
      document.getElementById('newPassword').style.display = 'block';
      document.getElementById('submitBtn').style.display = 'block';
    })
    .catch(function(err){
      document.getElementById('emailLine').textContent = 'This link has expired or already been used.';
      showMsg('Please request a new reset link from the login page and try again right after it arrives.', false);
    });
}

function submitNewPassword(){
  const newPassword = document.getElementById('newPassword').value;
  if(!newPassword || newPassword.length < 6){
    showMsg('Password must be at least 6 characters.', false);
    return;
  }
  auth.confirmPasswordReset(oobCode, newPassword)
    .then(function(){
      document.getElementById('formState').style.display = 'none';
      document.getElementById('successState').style.display = 'block';
    })
    .catch(function(err){
      showMsg('Error: ' + err.message, false);
    });
}
</script>
</body>
</html>
